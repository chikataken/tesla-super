<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shipment Creator</title>
<style>
  :root{
    /* Light theme — modeled on SuperDispatch's Shipper TMS: cool off-white page,
       white cards, soft gray borders, a blue primary. */
    --bg:#f4f6f8; --card:#ffffff; --card2:#eef1f5; --line:#dde2e8;
    --text:#1b2330; --muted:#69707d; --accent:#2563eb; --good:#1a9e57; --warn:#b9791a; --bad:#d6453c;
    /* ---- motion foundation (one signature easing + a few duration tokens) ---- */
    --ease:cubic-bezier(.2,.7,.2,1); --dur-fast:120ms; --dur:200ms; --dur-slow:320ms;
  }
  /* honor reduced-motion everywhere */
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms!important;animation-delay:0!important;transition-duration:.001ms!important}
  }
  /* spare-VINs panel paused for now — the right space is the detail pane */
  .spares{display:none}
  /* ---- master-detail: the list shrinks left to make room, the clicked card's focused
     bubble slides in on its right (no page swap). ---- */
  /* The order list keeps a STATIC width and sits centered. Opening a card slides the list LEFT
     and the detail OUT to the right (from the center) — the two flow apart. Nothing resizes:
     the list never changes width, the detail is a fixed panel that grows in from 0. */
  .board{display:flex;justify-content:center;align-items:stretch;gap:0;flex:1;min-height:0;overflow:hidden;--detail-w:590px}
  @media(max-width:1560px){.board{--detail-w:470px}}     /* trim the detail on narrower windows */
  @media(max-width:1240px){.board{--detail-w:380px}}
  #list{flex:0 1 740px;min-width:0;min-height:0;overflow-y:auto;padding:2px 6px 52px}
  /* the cards slide left and the detail slides OUT to the right from center as this column grows.
     The detail content is a FIXED width so it slides out clean instead of warping/reflowing. */
  .board-detail{flex:0 0 0;min-width:0;min-height:0;overflow:hidden;overscroll-behavior:contain;
    transition:flex-basis 440ms var(--ease)}
  .board.split .board-detail{flex-basis:var(--detail-w);overflow-y:auto;overflow-x:hidden}
  /* While the post-upload SD dedup scan is running, gray + lock the board cards so you can't
     interact with already-posted units before the scan removes them (scroll still works). */
  .board.scanning #list{opacity:.55;filter:grayscale(45%)}
  .board.scanning #list > *{pointer-events:none}
  .board.scanning #detail{opacity:.55;filter:grayscale(45%);pointer-events:none}
  .detail-inner{width:calc(var(--detail-w) - 24px);margin-left:24px;padding-bottom:24px}
  /* hide all scrollbars (scrolling still works) */
  #list,.board-detail,.navrail,#terminals.panel.active,#users.panel.active{scrollbar-width:none;-ms-overflow-style:none}
  #list::-webkit-scrollbar,.board-detail::-webkit-scrollbar,.navrail::-webkit-scrollbar,#terminals.panel.active::-webkit-scrollbar,#users.panel.active::-webkit-scrollbar{display:none}
  /* a gentle fade on open (the column-grow provides the slide-out); not on drag/refresh */
  .detail-inner.opening{animation:detail-fade 300ms var(--ease) both}
  @keyframes detail-fade{from{opacity:0}to{opacity:1}}
  .detail-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .detail-route{font-weight:700;font-size:15px;color:var(--text)}
  .detail-x{margin-left:auto;padding:5px 11px;font-size:13px}
  .lrow.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 2px 10px rgba(15,23,42,.08)}
  /* selected-VIN actions: a sized-down footer sitting under the VIN bubbles in the detail */
  .vin-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px;
    padding:9px 12px;background:var(--card2);border:1px solid var(--line);border-radius:9px}
  .vin-actions[hidden]{display:none}
  .va-info{font-size:12px;color:var(--muted);margin-right:auto}
  .vin-actions .btn{font-size:12px;padding:6px 11px}
  .vin-actions .btn:disabled{opacity:.45;cursor:default}
  *{box-sizing:border-box}
  html{height:100%}
  body{margin:0;height:100%;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--text);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  /* fixed top bar — stays put while the order cards scroll underneath */
  header{padding:14px 24px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;position:relative;flex:none;background:var(--bg);z-index:20}
  header h1{font-size:16px;margin:0;font-weight:650}
  .pill{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 10px}
  .profsel{background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:9px;
    padding:6px 10px;font-size:13.5px;cursor:pointer}
  .profsel:focus{outline:none;border-color:var(--accent)}
  .profsel.unset{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.16)}
  .btn.live{background:#7a1f1f;border-color:#a83232;color:#fff;font-weight:650}
  .btn.live:hover{background:#982828}
  .btn.amber{background:var(--warn);border-color:var(--warn);color:#3a2a06;font-weight:700}
  .btn.amber:disabled{opacity:.7;cursor:not-allowed}
  .lrow .btn.live{padding:4px 10px;font-size:12px;margin-left:8px}
  .profrow{display:grid;grid-template-columns:80px 130px 1fr auto;gap:10px;align-items:center;margin-bottom:8px}
  .profrow .pname{font-weight:600;font-size:13.5px}
  .profrow .btn{padding:6px 12px;font-size:13px}
  .tabs{display:flex;gap:6px;margin-left:auto;align-items:center}
  /* Per-tab search/sort row, centered in the top bar (only the active tab's group shows) */
  .header-tools{flex:1;min-width:0;display:flex;justify-content:center}
  .ht-group{display:flex;align-items:center;gap:10px;white-space:nowrap}
  .ht-group[hidden]{display:none}
  .header-tools .toolbar{margin:0}
  .header-tools input[type=search]{min-width:220px}
  .tab{background:transparent;border:1px solid transparent;color:var(--muted);
    padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:600;
    transition:background .12s,color .12s,border-color .12s}
  .tab:hover{background:var(--card2);color:var(--text)}
  .tab.active{background:#e8f0fe;color:var(--accent);border-color:rgba(37,99,235,.35)}

  /* ---- left nav rail (SuperDispatch-style dark column) ---- */
  .appshell{display:flex;align-items:stretch;flex:1;min-height:0;overflow:hidden}
  .appmain{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden}
  /* fixed left column — full height, doesn't scroll with the cards */
  .navrail{width:200px;flex:none;background:#16202e;display:flex;flex-direction:column;gap:4px;
    padding:18px 12px;overflow-y:auto}
  .nav-logo{color:#fff;font-weight:700;font-size:16px;letter-spacing:.02em;padding:4px 10px 18px}
  .navrail .navitem{display:block;width:100%;text-align:left;background:transparent;border:none;
    color:#aeb8c8;font-size:14px;font-weight:600;
    padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .12s,color .12s}
  .navrail .navitem:hover{background:rgba(255,255,255,.06);color:#fff}
  .navrail .navitem.active{background:rgba(255,255,255,.10);color:#fff}
  .navrail .profimg{width:86%;align-self:center;border-radius:12px;display:block;margin:2px 0 6px}
  /* ---- toolbar sort dropdown (SD-style: label + direction toggle) ---- */
  .sortwrap{position:relative;display:flex;align-items:center}
  .sortbtn-dd{display:inline-flex;align-items:center;gap:7px;background:var(--card);
    border:1px solid var(--line);border-right:none;border-radius:8px 0 0 8px;color:var(--text);
    padding:8px 12px;font-size:13.5px;cursor:pointer;white-space:nowrap}
  .sortbtn-dd b{font-weight:700}
  .sortbtn-dd .caret{color:var(--muted);font-size:10px}
  .sortbtn-dd:hover{background:var(--card2)}
  .sortdir{background:var(--card);border:1px solid var(--line);border-radius:0 8px 8px 0;
    color:var(--accent);font-size:15px;font-weight:700;cursor:pointer;padding:7px 12px;line-height:1}
  .sortdir:hover{background:var(--card2)}
  .sortmenu{min-width:180px}
  .wrap{flex:1;min-height:0;display:flex;flex-direction:column;
    width:100%;max-width:1680px;margin:0 auto;padding:14px 28px 0}
  .panel{display:none}
  .panel.active{display:flex;flex-direction:column;flex:1;min-height:0}
  /* terminals & users just scroll as one block; the orders panel uses two internal scroll panes */
  #terminals.panel.active,#users.panel.active,#recorded.panel.active{display:block;overflow:auto;padding-bottom:40px}
  /* ---- Recorded shipments ---- */
  /* status groups as a sub-list in the dark left nav rail */
  .recnav{display:flex;flex-direction:column;gap:1px;margin:2px 0 6px;
    border-left:2px solid rgba(255,255,255,.08);padding-left:4px}
  .recnav .ritem{display:flex;align-items:center;justify-content:space-between;gap:8px;
    width:100%;background:transparent;border:none;color:rgba(255,255,255,.62);
    font:inherit;font-size:12.5px;padding:5px 10px;border-radius:7px;cursor:pointer;
    text-transform:capitalize;text-align:left}
  .recnav .ritem:hover{background:rgba(255,255,255,.06);color:#fff}
  .recnav .ritem.active{background:rgba(255,255,255,.12);color:#fff}
  .recnav .ritem .rn{font-variant-numeric:tabular-nums;font-size:11px;opacity:.7;
    background:rgba(255,255,255,.08);border-radius:999px;padding:0 7px;min-width:20px;text-align:center}
  .rec-list{padding:0 4px}
  .rec-empty{padding:30px;color:var(--muted)}
  .rec-table{width:100%;border-collapse:collapse;font-size:13px}
  .rec-table th{text-align:left;padding:7px 10px;color:var(--muted);font-weight:600;
    border-bottom:1px solid rgba(0,0,0,.08);position:sticky;top:0;background:var(--bg)}
  .rec-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:top}
  .rec-table tr:hover td{background:var(--card2)}
  .rec-table .rnum{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .rec-table .rroute{color:var(--text);min-width:240px;white-space:nowrap}
  .rec-table .rroute .arr{color:var(--muted);padding:0 4px}
  .rec-table .rdate{color:var(--muted);white-space:nowrap}
  .rec-table .vin{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;
    background:rgba(0,0,0,.05);border-radius:4px;padding:1px 5px;white-space:nowrap}
  .rbadge{display:inline-block;border-radius:999px;padding:1px 8px;font-size:11px;
    font-weight:700;text-transform:capitalize;background:rgba(0,0,0,.06);color:var(--muted)}
  .rb-posted{background:#e8f0fe;color:#2563eb}
  .rb-accepted{background:#e7f6ec;color:#15803d}
  .rb-picked_up{background:#fff4e5;color:#b45309}
  .rb-delivered{background:#eafaf1;color:#0f766e}
  .rb-invoiced{background:#f3e8ff;color:#7c3aed}
  .rb-paid{background:#dcfce7;color:#166534}
  .rb-pending,.rb-new,.rb-requests{background:#f1f5f9;color:#475569}

  /* dispatcher "bubble" dropdown (replaces the native select) */
  .profwrap{position:relative}
  /* dispatcher selector relocated into the dark left rail */
  .navrail .profwrap{margin:2px 0 8px}
  /* dispatcher selector styled like the other rail options: rectangular, flush, no accent */
  .navrail .profbtn{width:100%;justify-content:space-between;background:transparent;border:none;
    border-radius:8px;color:#aeb8c8;font-size:14px;font-weight:600;padding:10px 12px}
  .navrail .profbtn:hover{background:rgba(255,255,255,.06);color:#fff}
  .navrail .profbtn.unset{border:none;box-shadow:none}
  .navrail .profbtn .caret{color:rgba(255,255,255,.6)}
  .navrail .profmenu{left:0;right:0;min-width:0}
  .profbtn{display:inline-flex;align-items:center;gap:7px;background:var(--card);
    border:1px solid var(--line);color:var(--text);border-radius:999px;
    padding:6px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
  .profbtn:hover{background:var(--card2)}
  .profbtn .caret{color:var(--muted);font-size:10px}
  .profbtn.unset{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.16)}
  .profmenu{position:absolute;top:calc(100% + 6px);left:0;z-index:1000;min-width:200px;
    background:var(--card);border:1px solid var(--line);border-radius:10px;padding:5px;
    box-shadow:0 12px 30px rgba(15,23,42,.14)}
  .profmenu[hidden]{display:none}
  .pm-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;
    cursor:pointer;font-size:13.5px;color:var(--text)}
  .pm-item:hover{background:var(--card2)}
  .pm-item.active{color:var(--accent);font-weight:700}
  .pm-sep{height:1px;background:var(--line);margin:5px 4px}
  .pm-edit{color:var(--muted);font-weight:600}
  .pm-edit:hover{color:var(--text)}

  /* Users (Edit users) page */
  .users-layout{display:grid;grid-template-columns:1fr 280px;gap:18px;align-items:start;
    max-width:1100px;margin:0 auto;padding:8px 4px}
  .users-h{font-size:16px;font-weight:650;margin:0}
  .users-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .users-bar .btn{font-size:13px;padding:7px 13px}
  .ucard{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:13px 14px;margin-bottom:10px}
  .ucard.allp{opacity:.9}
  .ucard-top{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .ucard-top input.uname{font-weight:650;font-size:14px;min-width:120px;max-width:170px}
  .ucard-top input.uphone{min-width:130px;max-width:170px}
  .ulbl{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:12px 0 6px}
  .uchips{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .schip{display:inline-flex;align-items:center;gap:4px;background:var(--card2);
    border:1px solid var(--line);border-radius:6px;padding:2px 3px 2px 9px;font-size:12.5px;
    font-variant-numeric:tabular-nums}
  .schip button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;
    line-height:1;padding:0 4px}
  .schip button:hover{color:#ff6b6b}
  .uadd{width:96px!important;text-transform:uppercase;font-variant-numeric:tabular-nums}
  .ucard-actions{display:flex;align-items:center;gap:9px;margin-top:12px}
  .unone{color:var(--muted);font-size:12px;font-style:italic}
  .users-side{position:sticky;top:14px;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:13px 14px}
  .unclaimed{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .uc-state{background:var(--card2);border:1px solid var(--line);border-radius:6px;
    padding:3px 8px;font-size:12.5px;color:var(--text);cursor:default}
  /* DC stands out in light red wherever it appears as a state */
  .schip.dc{background:rgba(255,107,107,.16);border-color:rgba(255,107,107,.55)}
  .uc-state.dc{background:rgba(255,107,107,.16);border-color:rgba(255,107,107,.55)}
  .uc-empty{color:var(--good);font-size:12.5px}
  .uc-count{color:var(--muted);font-size:12px;font-weight:400;margin-left:6px}

  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:10px}
  .toolbar input[type=search]{min-width:300px}   /* fit the whole placeholder */
  input[type=search],input[type=text],input[type=number],textarea{background:var(--card);
    border:1px solid var(--line);color:var(--text);border-radius:6px;padding:8px 11px;font-size:14px;outline:none}
  input:focus,textarea:focus{border-color:var(--accent)}
  textarea{font-family:ui-monospace,Menlo,monospace;resize:vertical}
  .count{color:var(--muted);font-size:13px;white-space:nowrap}
  button.btn{background:var(--accent);border:none;color:#fff;border-radius:6px;
    padding:8px 15px;font-size:13.5px;font-weight:600;cursor:pointer}
  button.btn:disabled{opacity:.45;cursor:default}
  button.ghost{background:var(--card);border:1px solid var(--line);color:var(--text)}
  button.green{background:var(--good)}
  button.green:hover:not(:disabled){filter:brightness(1.07)}

  /* shipment list (level 1) */
  /* main order list: each shipment is a rich card (SuperDispatch-style), ~80% of the
     focused route card, with pickup/delivery formatted like SD's two-stop layout. */
  .lrow{display:block;background:var(--card);border:1px solid var(--line);
    border-radius:10px;margin-bottom:8px;padding:7px 22px;cursor:pointer;
    transition:box-shadow .12s,border-color .12s}
  .lrow:hover{border-color:#c3ccd8;box-shadow:0 2px 10px rgba(15,23,42,.08)}
  .oc-top{display:flex;align-items:center;gap:10px;margin-bottom:5px}
  .oc-num{font-weight:700;font-size:14px;color:var(--text)}
  .oc-units{font-size:12px;color:var(--muted)}
  .oc-sd{font-size:10px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;
    padding:2px 9px;border-radius:999px}
  .oc-sd.sd-amber{color:var(--warn);background:rgba(185,121,26,.12);border:1px solid rgba(185,121,26,.4)}
  .oc-sd.sd-green{color:var(--good);background:rgba(26,158,87,.12);border:1px solid rgba(26,158,87,.4)}
  .lrow .chev{margin-left:auto;color:var(--muted);font-size:18px}
  /* SuperDispatch route layout: pickup stacked OVER delivery, orange origin dot + blue
     destination dot joined by a dotted connector line. Addresses left, units right. */
  .oc-body{display:flex;justify-content:space-between;align-items:flex-start;gap:40px}
  .oc-route{position:relative;flex:1;min-width:0}
  .oc-stop{position:relative;padding:0 0 6px 22px}
  .oc-stop:last-child{padding-bottom:0}
  .oc-stop::before{content:"";position:absolute;left:1px;top:4px;width:9px;height:9px;
    border-radius:50%;z-index:1}
  .oc-stop.pickup::before{background:#ef8a2b}      /* origin marker (orange, like SD) */
  .oc-stop.delivery::before{background:var(--good);border-radius:2px}   /* destination = green square */
  .oc-stop.pickup::after{content:"";position:absolute;left:5px;top:11px;bottom:-1px;
    border-left:2px dotted #cdd4de}                /* the connector between the two dots */
  .oc-city{font-weight:700;font-size:14px;color:var(--text);line-height:1.25;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .oc-sub{font-size:12px;color:var(--muted);margin-top:1px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lrow .vbubs{flex:none;margin-top:2px;max-width:320px}
  .due{display:flex;gap:5px;flex-wrap:nowrap;justify-content:flex-end}
  /* two-tone count chip: label segment + shaded count segment, in one pill */
  .chip{display:inline-flex;align-items:center;border:1px solid var(--line);
    border-radius:5px;overflow:hidden;font-size:11.5px;white-space:nowrap;color:var(--text)}
  .chip .lbl{padding:1px 7px}
  .chip .n{padding:1px 6px;background:rgba(0,0,0,.05);color:var(--muted);font-variant-numeric:tabular-nums}
  .chip.nb-none{color:var(--muted)}
  .chip.nb-soon{color:var(--warn);border-color:var(--warn)}
  .chip.nb-soon .n{color:var(--warn)}
  .chip.nb-over{color:#ff6b6b;border-color:#ff6b6b}
  .chip.nb-over .n{color:#ff6b6b}

  /* orders sidebar + sort controls */
  .orders-layout{display:flex;gap:18px;flex:1;min-height:0}
  .sidebar{width:190px;flex:none;position:sticky;top:64px}
  .side-title{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:2px 6px 9px}
  .sortbtn{display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;
    background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:8px;
    padding:9px 11px;font-size:13.5px;cursor:pointer;margin-bottom:6px}
  .sortbtn:hover{background:var(--card2)}
  .sortbtn.active{border-color:var(--accent)}
  .sortbtn .dir{color:var(--accent);font-size:11.5px;font-variant-numeric:tabular-nums;min-width:30px;text-align:right}
  /* active dispatcher's avatar — a little narrower than the sort buttons, centered */
  .profimg{display:block;width:84%;margin:14px auto 0;border-radius:12px}
  .orders-main{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column}
  @media(max-width:720px){.orders-layout{flex-direction:column}.sidebar{width:100%;position:static}.spares{width:100%;position:static}}

  /* third column: the spare-VIN workspace — VINs set aside, kept off the board */
  .spares{width:340px;flex:none;position:sticky;top:64px;
    border:1px dashed var(--line);border-radius:10px;padding:10px;background:var(--card)}
  .spares.drop-ok{border-style:solid;border-color:var(--good);box-shadow:0 0 0 1px var(--good) inset}
  .spares .side-title{display:flex;align-items:center;justify-content:space-between;margin:0 2px 9px}
  .spares .side-title .n{color:var(--text);background:rgba(0,0,0,.05);border:1px solid var(--line);
    border-radius:999px;padding:0 8px;font-size:11px;font-variant-numeric:tabular-nums}
  .spare-empty{color:var(--muted);font-size:12px;line-height:1.5;padding:16px 6px;text-align:center}
  .spare-row{display:flex;align-items:center;gap:9px;background:var(--card2);border:1px solid var(--line);
    border-radius:7px;padding:6px 8px;margin-bottom:5px;cursor:grab;user-select:none}
  .spare-row:hover{background:var(--card2)}
  .spare-row.dragging{opacity:.45}
  .spare-meta{flex:1;min-width:0}
  .spare-route{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .spare-sub{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .spare-ret{background:none;border:1px solid var(--line);color:var(--muted);border-radius:6px;
    cursor:pointer;font-size:13px;line-height:1;padding:3px 7px;flex:none}
  .spare-ret:hover{color:var(--text);border-color:var(--accent)}
  /* No cap on how many VINs can be set aside: the list scrolls inside its own column so
     even a long spare list stays fully reachable (the sticky column won't run off-screen). */
  #spareList{max-height:calc(100vh - 140px);overflow-y:auto;padding-right:2px}

  /* due flag on the list row: red = overdue, yellow = due within 3 days */
  .duebang{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
    border:1.5px solid;border-radius:5px;font-weight:800;font-size:13px;line-height:1}
  .duebang.over{border-color:#ff5c5c;color:#ff5c5c}
  .duebang.soon{border-color:#e0a341;color:#e0a341}

  /* Each shipment renders as ONE cohesive bar, split into per-car segments by
     slanted cuts — glance down the list to count shipments, glance across a bar
     to count its cars. Regular models (X/Y/3/S) are translucent gray; Cybertruck
     (CT) and Cybercab (CC) keep their accent tint so trucks pop at a glance. */
  .vbubs{display:inline-flex;align-items:stretch;max-width:300px;
    border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .vbub{display:inline-flex;align-items:center;justify-content:center;
    min-width:22px;height:17px;padding:0 7px;transform:skewX(-14deg);
    background:rgba(0,0,0,.045);color:var(--muted);     /* models 3/Y/X/S: translucent light gray */
    font-size:11px;font-weight:800;font-variant-numeric:tabular-nums;
    border-right:2px solid var(--bg)}              /* the slanted cut between cars */
  /* bleed the end segments past the corners so the slant only shows as a cut
     between segments, never as a notch at the bar's ends */
  .vbub:first-child{margin-left:-8px;padding-left:15px}
  .vbub:last-child{margin-right:-8px;padding-right:15px;border-right:none}
  .vbub>span{display:inline-block;transform:skewX(14deg)}   /* keep glyphs upright */
  /* Cybertruck: translucent stainless-steel silver (brighter/cooler than the gray) */
  .vbub.ct{background:rgba(120,135,160,.18);color:#566072}
  /* Cybercab: translucent gold (like the real Cybercab) */
  .vbub.cc{background:rgba(212,170,60,.22);color:#8a6d14}

  /* route drill-down header */
  .routehdr{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  /* shared route location bubble at the top of a focused route — all shipments here
     share the same pickup/delivery, so the address dialogue is shown ONCE, titled
     by the route (not a shipment number). */
  .routeloc{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:12px 15px;margin-bottom:12px}
  .routeloc-title{font-weight:650;font-size:15px;margin-bottom:11px}
  .routeloc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px}
  @media(max-width:640px){.routeloc-grid{grid-template-columns:1fr}}
  /* expandable Shipment Comments under the route bubble */
  .rnotes{margin-top:11px;border-top:1px solid var(--line);padding-top:9px}
  .rnotes summary{cursor:pointer;font-size:12px;color:var(--accent);list-style:none;user-select:none;width:max-content}
  .rnotes summary::-webkit-details-marker{display:none}
  .rnotes summary::before{content:'▸ '}
  .rnotes[open] summary::before{content:'▾ '}
  .rnotes .routeloc-grid{margin-top:9px}
  .rnotes .loc-contact{white-space:pre-wrap}

  /* header tally (left of the Orders tab): blue "Excel +" button -> outlined counter
     whose fill grows with processed/total VINs (GREEN while reading, AMBER + clickable
     to resume when stalled) -> green Post button when done */
  .tally{display:inline-flex;align-items:center;gap:6px}
  /* Excel+ stays visible always; grays out (still clickable) once a board is loaded */
  .tally .btn.excelbtn.loaded{background:var(--card2);color:var(--muted);border:1px solid var(--line)}
  .tally .btn.excelbtn.loaded:hover{background:var(--card);color:var(--text);border-color:var(--accent)}
  /* Paste rows : sits next to Excel+, same muted-until-hover treatment */
  .tally .btn.pastebtn{background:var(--card2);color:var(--muted);border:1px solid var(--line)}
  .tally .btn.pastebtn:hover{background:var(--card);color:var(--text);border-color:var(--accent)}
  /* Paste modal */
  .pastemodal{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.55);
    display:flex;align-items:center;justify-content:center}
  .pastemodal[hidden]{display:none}
  .pastebox{width:min(1040px,95vw);background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:18px 18px 16px;box-shadow:0 18px 50px rgba(15,23,42,.16)}
  .pastehdr{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
  .pastesub{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
  /* blank-spreadsheet paste grid — looks and behaves like an Excel sheet */
  .pastegrid-wrap{max-height:52vh;overflow:auto;border:1px solid var(--line);border-radius:8px;background:var(--card)}
  .pastegrid{border-collapse:separate;border-spacing:0;font-size:12.5px;table-layout:fixed;width:max-content}
  .pastegrid th{background:var(--card2);color:var(--muted);font-weight:600;font-size:11px;
    border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:4px 6px;
    text-align:center;position:sticky;user-select:none}
  .pastegrid thead th{top:0;z-index:2}
  .pastegrid .pg-corner{left:0;top:0;z-index:3;min-width:38px}
  .pastegrid .pg-rownum{left:0;z-index:1;min-width:38px}
  .pastegrid td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:4px 8px;min-width:104px;max-width:240px;height:24px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;outline:none;color:var(--text);background:var(--card)}
  .pastegrid td:focus{box-shadow:inset 0 0 0 2px var(--accent);background:#fff;
    overflow:visible;text-overflow:clip;position:relative;z-index:1}
  .pasterow{display:flex;align-items:center;gap:8px;margin-top:12px}
  .pastemsg{font-size:12px;color:var(--muted);margin-left:4px}
  /* Post button slot in the nav (where Settings used to be) */
  .navpost{display:inline-flex;align-items:center}
  .navpost .btn{padding:6px 14px;font-size:13px;white-space:nowrap}
  .navpostlbl{font-size:12px;color:var(--muted);padding:6px 10px;white-space:nowrap}
  .tally .tinyadd{width:26px;height:26px;flex:none;border-radius:7px;border:1px solid var(--line);
    background:var(--card);color:var(--muted);font-size:16px;line-height:1;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center}
  .tally .tinyadd:hover{color:var(--text);border-color:var(--accent)}
  .tally .counter{position:relative;overflow:hidden;color:var(--text);
    border:1px solid var(--line);border-radius:9px;padding:6px 12px;font-size:12.5px;
    background:var(--card);white-space:nowrap}
  .tally .counter.green{border-color:var(--good)}
  .tally .counter.amber{border-color:var(--warn);cursor:pointer}
  .tally .counter.amber:hover{background:rgba(185,121,26,.12)}
  .tally .counter .fill{position:absolute;left:0;top:0;bottom:0;width:0;
    transition:width .4s ease;z-index:0}
  .tally .counter.green .fill{background:rgba(55,201,122,.20);border-right:1px solid var(--good)}
  .tally .counter.amber .fill{background:rgba(224,163,65,.20);border-right:1px solid var(--warn)}
  .tally .counter .lbl{position:relative;z-index:1}
  /* trailing dots blink in sequence while VINs are actively being read */
  .tally .dots span{animation:blink 1.4s infinite both}
  .tally .dots span:nth-child(2){animation-delay:.2s}
  .tally .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
  .tally .btn{font-size:13px;padding:7px 14px;white-space:nowrap}
  /* per-shipment posting dates, shown inline in the card head (replaces the need-by chip) */
  .dates{font-size:11.5px;color:var(--muted)}
  .dates b{color:var(--text);font-weight:600}
  .dates .tdays{margin-left:8px;opacity:.75}
  .rlabel{font-weight:650;font-size:15px}

  /* route cards (level 2) */
  .card{background:var(--card);border:1px solid var(--line);border-radius:6px;margin-bottom:5px;overflow:hidden}
  .head{display:flex;align-items:center;gap:12px;padding:8px 12px}
  .num{font-weight:650;min-width:90px;font-size:13.5px}
  .cnt{font-size:11.5px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:1px 8px;white-space:nowrap;margin-left:auto}
  .price{font-variant-numeric:tabular-nums;font-weight:650;color:var(--good);font-size:13.5px}
  .price.none{color:var(--muted);font-weight:500}
  /* editable total-price field; the current/placeholder price shows translucent */
  .priceedit{width:104px;text-align:right;font-variant-numeric:tabular-nums;font-weight:650;
    font-size:13px;color:var(--good);background:var(--card2);border:1px solid var(--line);
    border-radius:6px;padding:4px 8px;outline:none}
  .priceedit::placeholder{color:var(--good);opacity:.4}        /* translucent current price */
  .priceedit:focus{border-color:var(--accent)}
  .price.locked{display:inline-flex;align-items:center;gap:4px;opacity:.7;cursor:not-allowed}
  .need{font-size:11px;border:1px solid var(--line);border-radius:5px;
    padding:1px 7px;white-space:nowrap;color:var(--text)}
  .need.nb-none{color:var(--muted)}
  .need.nb-soon{color:var(--warn);border-color:var(--warn)}
  .need.nb-over{color:#ff6b6b;border-color:#ff6b6b;font-weight:600}
  .vneed{font-size:11.5px;color:var(--muted);white-space:nowrap;min-width:104px;text-align:right;margin-left:auto}
  .vneed.nb-soon{color:var(--warn)}
  .vneed.nb-over{color:#ff6b6b;font-weight:600}
  .vneed.nb-missing{color:var(--bad);font-weight:700}
  /* Unpostable VINs (no Tesla BOL): pinned at top, grayed, non-interactive */
  .upsec{margin-bottom:14px;border:1px solid var(--bad);border-radius:9px;
    background:rgba(226,85,78,.06);overflow:hidden}
  .uphdr{font-size:12px;font-weight:700;color:var(--bad);padding:8px 12px;
    border-bottom:1px solid rgba(226,85,78,.25)}
  .vrow.uprow{opacity:.5;cursor:default;background:transparent;filter:grayscale(1)}
  .vrow.uprow .bvin{color:var(--muted)}
  .vrow.uprow:hover{background:rgba(0,0,0,.03)}
  /* VIN with no valid NeedByDate in the Excel — flagged red */
  .vrow.nbbad{background:rgba(226,85,78,.10);box-shadow:inset 3px 0 0 var(--bad)}
  .vrow.nbbad:hover{background:rgba(226,85,78,.16)}
  .chev{color:var(--muted);transition:transform .15s;cursor:pointer}.open .chev{transform:rotate(90deg)}
  .bubbles{margin:0 12px 8px;border:1px solid var(--line);border-radius:5px;
    overflow:hidden;background:var(--card2)}
  .vrow{display:flex;align-items:center;gap:12px;padding:5px 10px;border-bottom:1px solid var(--line);cursor:grab;user-select:none}
  .vrow:last-child{border-bottom:none}
  .vrow:hover{background:var(--card2)}
  .vrow.dragging{opacity:.45}
  .vrow.sel{background:#e8f0fe;box-shadow:inset 3px 0 0 var(--accent)}
  .vdesc{flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
  .bvin{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;color:var(--muted)}
  .brate{font-size:12.5px;color:var(--good);font-variant-numeric:tabular-nums;min-width:74px;text-align:right}
  /* small copy-to-clipboard button used in route VIN rows and spare rows */
  .copyvin{background:none;border:1px solid var(--line);color:var(--muted);border-radius:5px;
    cursor:pointer;font-size:10.5px;line-height:1;padding:3px 7px;flex:none;white-space:nowrap}
  .copyvin:hover{color:var(--text);border-color:var(--accent)}
  .muted{color:var(--muted);font-size:13px}
  .card.drop-ok{box-shadow:0 0 0 2px var(--good) inset}
  .body{display:none;border-top:1px solid var(--line);padding:14px 16px;background:var(--card2)}.open .body{display:block}
  .legs{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:640px){.legs{grid-template-columns:1fr}}
  .leg h4{margin:0 0 5px;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .leg .name{font-weight:600}
  .leg .addr,.leg .contact{color:var(--muted);font-size:13px;margin-top:3px}
  .empty{color:var(--muted);text-align:center;padding:60px 0}

  /* universal action bar (selection actions + spare-placement dialogue) */
  #actionbar,#placebar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(34px);
    display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:10px 14px;box-shadow:0 10px 34px rgba(15,23,42,.16);
    opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:30}
  #actionbar.show,#placebar.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #actionbar #selinfo,#placebar #placeinfo{font-size:13px;color:var(--muted);margin-right:4px}
  #placebar.show{border-color:var(--accent)}

  /* empty-route placement panel: the blue "create" call-to-action when a spare's
     route has no shipment yet */
  .empty-route{text-align:center;padding:48px 0;display:flex;flex-direction:column;gap:14px;align-items:center}
  .btn.create{font-size:14px;padding:11px 20px;border-radius:8px}
  .spare-row.pending{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;background:#e8f0fe}

  #toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#222833;
    border:1px solid var(--line);color:#fff;padding:9px 16px;border-radius:10px;
    font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:40}

  .form{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;display:grid;
    grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:16px;max-width:560px}
  .form label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .form .full{grid-column:1/-1}
  .checks{display:flex;gap:20px;flex-wrap:wrap;align-items:center}
  .checks label{display:flex;align-items:center;gap:7px;color:var(--text);font-size:14px;margin:0;cursor:pointer}
  .warn{color:var(--warn);font-size:12.5px}
  .form input,.form select{background:var(--card2);border:1px solid var(--line);border-radius:7px;
    color:var(--text);font-size:13.5px;padding:7px 9px;box-sizing:border-box}
  .form input:focus,.form select:focus{outline:none;border-color:var(--accent)}
  .seth{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:6px 0 -2px;border-bottom:1px solid var(--line);padding-bottom:8px}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
  pre.out{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:14px;
    font:12.5px/1.5 ui-monospace,Menlo,monospace;white-space:pre-wrap;word-break:break-word;
    min-height:240px;max-height:60vh;overflow:auto;color:#cdd3df;margin:0}

  /* ---- consolidation: Search VINs results + route-view match cards ---- */
  .badge{font-size:10.5px;border-radius:5px;padding:1px 7px;border:1px solid var(--line);
    color:var(--muted);white-space:nowrap}
  .badge.posted{color:#3a2a06;background:var(--warn);border-color:var(--warn);font-weight:700}
  .badge.unposted{color:var(--muted)}
  .badge.match{color:#0b0d12;background:var(--warn);border-color:var(--warn);font-weight:700}
  /* where a stop's venue came from: green = original scraped terminal DB,
     yellow = a terminal we LEARNED from a BOL, red = straight off the Tesla BOL */
  .srcbadge{font-size:9.5px;border-radius:4px;padding:0 5px;margin-left:6px;border:1px solid var(--line);
    white-space:nowrap;vertical-align:middle;font-weight:700;letter-spacing:.02em}
  .srcbadge.db{color:#06210f;background:var(--good);border-color:var(--good)}
  .srcbadge.linked{color:#06210f;background:var(--good);border-color:var(--good)}
  .srcbadge.added{color:#3a2a06;background:var(--warn);border-color:var(--warn)}
  .srcbadge.excel{color:var(--muted);background:rgba(0,0,0,.05);border-color:var(--line)}
  /* Review group: shipments with any Excel-only stop, pinned at the very top */
  .reviewsec{border:1px solid var(--warn);border-radius:9px;margin-bottom:14px;overflow:hidden;
    background:rgba(224,163,65,.05)}
  .reviewhdr{font-size:12px;font-weight:700;color:var(--warn);padding:8px 12px;
    border-bottom:1px solid rgba(224,163,65,.3)}
  .reviewsec .lrow:hover{background:rgba(224,163,65,.10)}
  /* duplicate-VINs-removed: thin red slice above the cards -> focused route view */
  .dupslice{display:block;width:100%;box-sizing:border-box;margin:0 0 8px;padding:6px 12px;
    border-radius:8px;border:0;background:var(--bad);color:#fff;font-weight:600;font-size:12.5px;
    line-height:1.2;text-align:left;cursor:pointer}
  .dupslice:hover{filter:brightness(1.08)}
  .dupslice.active{box-shadow:inset 0 0 0 2px rgba(0,0,0,.18);filter:brightness(.95)}
  /* focused dup view: one bubble per route — basic route title + embedded VIN bubbles */
  .dup-detail-h{font-weight:700;color:var(--bad);font-size:13px;margin:2px 0 10px}
  .duproute{border:1px solid var(--bd,rgba(0,0,0,.14));border-radius:10px;padding:8px 10px;
    margin:0 0 12px;background:var(--card,#fff)}
  .duproute-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;margin:0 0 6px}
  .duproute-title .dr-n{margin-left:auto;font-weight:600;font-size:11px;color:var(--muted);
    background:rgba(0,0,0,.06);border-radius:10px;padding:1px 8px}
  .dupvin{display:flex;align-items:stretch;margin:5px 0;border-radius:8px;overflow:hidden;
    border:1px solid var(--bd,rgba(0,0,0,.14))}
  .dupvin .v{flex:0 0 80%;display:flex;align-items:center;padding:8px 10px;
    font-family:ui-monospace,Menlo,monospace;font-size:12.5px;letter-spacing:.2px;
    background:var(--card2,#f6f8fa);color:var(--text,#1f2328)}
  .dupvin .cp{flex:0 0 20%;border:0;border-left:1px solid var(--bd,rgba(0,0,0,.14));
    background:var(--acc,#0969da);color:#fff;font-weight:700;font-size:11px;cursor:pointer;
    white-space:nowrap;padding:0 4px}
  .dupvin .cp:hover{filter:brightness(1.1)}
  .dupvin .cp.ok{background:var(--ok,#1a7f37)}
  .srcbadge.bol{color:#fff;background:var(--bad);border-color:var(--bad)}
  /* Terminals tab */
  .term-main{padding:16px 20px;max-width:980px;margin:0 auto;width:100%}
  .term-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .t-row{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
  .t-head{display:flex;align-items:center;gap:8px}
  .t-name{font-weight:700;font-size:13.5px;color:var(--text)}
  .t-meta{font-size:12px;color:var(--muted);margin-top:3px}
  .t-contact{color:var(--text)}
  .t-notes{font-size:11.5px;color:var(--muted);margin-top:4px;white-space:pre-wrap;border-left:2px solid var(--line);padding-left:8px}
  .t-aliases{margin-top:7px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .t-allabel{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-right:2px}
  .t-alias{display:inline-flex;align-items:center;font-size:11.5px;color:var(--text);
    background:var(--card2);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .t-row{cursor:default}
  .t-edit-btn{margin-left:auto;font-size:11px;padding:2px 9px}
  .t-row.editing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .t-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin-top:10px}
  .t-edit-f{display:flex;flex-direction:column;gap:3px}
  .t-edit-f.wide{grid-column:1 / -1}
  .t-edit-f>span{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .t-edit-f input,.t-edit-f textarea{background:var(--card2);border:1px solid var(--line);
    border-radius:6px;color:var(--text);font:inherit;font-size:12.5px;padding:6px 8px;width:100%}
  .t-edit-f textarea{resize:vertical;white-space:pre-wrap;line-height:1.4}
  .t-edit-f input:focus,.t-edit-f textarea:focus{outline:none;border-color:var(--accent)}
  .t-edit-actions{display:flex;align-items:center;gap:8px;margin-top:11px}
  .t-edit-msg{font-size:11.5px;color:var(--muted)}
  .t-edit-msg.err{color:var(--warn)}
  .croute{color:var(--text);font-size:13px;margin:6px 0}
  .caddr{display:flex;gap:8px;align-items:baseline;font-size:12px;margin:3px 0;color:var(--text)}
  .caddr .al{flex:none;width:54px;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em}
  .caddr .astreet{flex:1;min-width:0}
  .caddr .acontact{color:var(--muted);font-size:11.5px;white-space:nowrap}
  .cvins{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
  .cvin{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:var(--muted);
    background:rgba(0,0,0,.045);border:1px solid var(--line);border-radius:4px;padding:1px 6px;
    display:inline-flex;align-items:center;gap:5px}
  .cvin.add{color:var(--warn);border-color:var(--warn)}
  .cfoot{display:flex;align-items:center;gap:10px;margin-top:8px}
  .guid{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cstatus{font-size:11.5px;color:var(--muted);text-transform:capitalize}

  /* Search VINs tab result cards (consolidation candidates stand out) */
  .ccard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:7px}
  .ccard.cand{border-color:var(--good);box-shadow:0 0 0 1px rgba(55,201,122,.25) inset}
  .ccard .chead{display:flex;align-items:center;gap:9px}

  /* route-view match card: an EXISTING SD shipment on this route. Outer ring:
     YELLOW if posted, GREEN if accepted. Laid out like a board shipment: a route
     bubble on top, the exact pickup/dropoff addresses, then the VIN bubbles. */
  .card.matchcard.posted{border-color:var(--warn);box-shadow:0 0 0 1px rgba(224,163,65,.4) inset}
  .card.matchcard.accepted{border-color:var(--good);box-shadow:0 0 0 1px rgba(55,201,122,.4) inset}
  .card.matchcard.drop-ok{box-shadow:0 0 0 2px var(--accent) inset}
  .badge.accepted{color:#06210f;background:var(--good);border-color:var(--good);font-weight:700}
  .sdwrap{padding:11px 12px}
  .routebubble{display:flex;flex-wrap:wrap;align-items:center;gap:8px;
    background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:7px 11px}
  .rb-route{font-weight:650;font-size:13.5px}
  .rb-meta{margin-left:auto;display:flex;gap:9px;align-items:center;color:var(--muted);font-size:11.5px}
  .rb-meta .num{font-weight:600;color:var(--text)}
  .addrsplit{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:9px;
    padding-bottom:10px;border-bottom:1px solid var(--line)}
  @media(max-width:640px){.addrsplit{grid-template-columns:1fr}}
  /* VIN bubbles — same idea as the excel VIN chips; SD ones are amber + LOCKED */
  .vinbubbles{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .vinbub{display:inline-flex;align-items:center;gap:5px;font-family:ui-monospace,Menlo,monospace;
    font-size:11.5px;border:1px solid var(--line);border-radius:13px;padding:3px 9px;color:var(--text)}
  .vinbub .mt{font-weight:800;font-size:10px;opacity:.85}
  .vinbub.sd{color:var(--warn);border-color:var(--warn);background:rgba(224,163,65,.13);
    cursor:not-allowed;user-select:none}                    /* locked: on SuperDispatch */
  .vinbub.add{color:var(--accent);border-color:var(--accent);background:rgba(79,140,255,.13)}
  .adddrop{font-size:12px;align-self:center}
  .xmini{background:none;border:none;color:inherit;cursor:pointer;font-size:13px;line-height:1;padding:0 0 0 2px}
  .xmini:hover{color:#ff6b6b}

  /* focused-route SD card: compact status header, ONE location bubble (all
     pickup/dropoff info), then full-line VIN bubbles like the excel rows */
  .mc-head{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .mc-head .num{font-weight:650;font-size:13.5px}
  .locbubble{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;
    background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:10px 13px}
  @media(max-width:640px){.locbubble{grid-template-columns:1fr}}
  .loc-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px}
  .loc-addr{font-size:12.5px;line-height:1.5}
  .loc-addr div:first-child{font-weight:600}
  .loc-contact{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:5px}
  /* locked (on-SD) and to-be VIN rows, reusing the excel .vrow look */
  .vrow.sdlock,.vrow.sdadd{cursor:default}
  /* on-SD VIN rows, color-coded by loadboard status: POSTED = amber, ACCEPTED =
     green (same as the card's outline). To-be VINs stay accent blue. */
  .vrow.sdlock.posted{background:rgba(224,163,65,.10)}
  .vrow.sdlock.posted:hover{background:rgba(224,163,65,.15)}
  .vrow.sdlock.posted .bvin,.vrow.sdlock.posted .locktag{color:var(--warn)}
  .vrow.sdlock.accepted{background:rgba(55,201,122,.10)}
  .vrow.sdlock.accepted:hover{background:rgba(55,201,122,.15)}
  .vrow.sdlock.accepted .bvin,.vrow.sdlock.accepted .locktag{color:var(--good)}
  .vrow.sdadd{background:rgba(79,140,255,.10)}
  .vrow.sdadd:hover{background:rgba(79,140,255,.14)}
  .vrow.sdadd .bvin{color:var(--accent)}
  .vrow.sddrop{cursor:default;font-size:12px;justify-content:center}
  .locktag{margin-left:auto;display:inline-flex;align-items:center;gap:4px;
    font-size:11px;color:var(--warn);white-space:nowrap}
  /* on locked SD VIN rows the copy button sits right after the VIN (lined up with the
     excel VIN rows); the lock keeps the right-push from .locktag's margin-left:auto */
  .rmline{margin-left:auto;background:none;border:1px solid var(--line);color:var(--accent);
    border-radius:5px;cursor:pointer;font-size:11px;padding:2px 8px;white-space:nowrap}
  .rmline:hover{border-color:var(--accent)}
  /* a route row tinted when existing SuperDispatch shipments matched into it:
     GREEN = accepted only, AMBER = any posted (amber wins). Very light highlight. */
  .lrow.sd-green{border-color:var(--good);background:rgba(55,201,122,.08)}
  .lrow.sd-green:hover{background:rgba(55,201,122,.14)}
  .lrow.sd-amber{border-color:var(--warn);background:rgba(224,163,65,.07)}
  .lrow.sd-amber:hover{background:rgba(224,163,65,.13)}
  /* Gmail-style unread: brighter background + bold; READ rows stay in the muted
     "dead" state. Coexists with the posted(amber)/accepted(green) outline — the
     colored border stays, the unread highlight layers a brighter fill + accent bar. */
  .lrow.unread{font-weight:650;box-shadow:inset 3px 0 0 0 var(--accent)}
  .lrow.unread .lroute,.lrow.unread .lroute b{color:var(--text)}
  .lrow.unread:not(.sd-green):not(.sd-amber){background:var(--card2)}
  .lrow.unread.sd-amber{background:rgba(224,163,65,.18)}
  .lrow.unread.sd-green{background:rgba(55,201,122,.20)}
  .sdlocked{opacity:.7;font-style:italic}
  /* TEST SITE (test.wastake.com) — loud banner so it's never mistaken for prod */
  body.testmode::before{content:"\26A0  TEST SITE — not wired to SuperDispatch · posting & terminal-push disabled";
    display:block;flex:none;z-index:99999;background:#b4520a;color:#fff;
    text-align:center;font-size:12px;font-weight:700;letter-spacing:.03em;padding:5px 8px}
  .testpill{background:#b4520a!important;color:#fff!important;border-color:#b4520a!important}
  /* TEST SITE: posting is disabled, so the "Post to SuperDispatch" button is a transparent,
     non-clickable placeholder (keeps the layout, but it's clearly inert). Inert on prod. */
  body.testmode .navpost .btn.green{background:transparent!important;color:var(--muted)!important;
    border:1px dashed var(--line)!important;box-shadow:none!important;cursor:default;pointer-events:none}
  /* Transparent "Post to SuperDispatch" placeholder — keeps the top bar's width static
     when there's no live post action (initial load / ALL profile). */
  .navpost .btn.ghostpost{background:transparent;color:var(--muted);border:1px dashed var(--line);
    box-shadow:none;cursor:default;pointer-events:none;font-weight:600}
</style>
</head>
<body>
<div class="appshell">
  <nav class="navrail">
    <div class="nav-logo">TFI TRANS</div>
    <div class="profwrap" id="profWrap">
      <button class="profbtn unset" id="profBtn" type="button" onclick="toggleProfMenu(event)"
              title="Dispatcher — select before uploading an Excel">
        <span id="profBtnLabel">Select dispatcher…</span><span class="caret">▾</span>
      </button>
      <div class="profmenu" id="profMenu" hidden></div>
    </div>
    <img id="profileImg" class="profimg" alt="" hidden onerror="this.hidden=true">
    <button class="tab navitem active" data-tab="orders">Shipments</button>
    <button class="tab navitem" data-tab="recorded">Recorded</button>
    <div id="recNav" class="recnav" hidden></div>
    <button class="tab navitem" data-tab="terminals">Terminals</button>
    <button class="tab navitem" data-tab="users">Settings</button>
  </nav>
  <div class="appmain">
<header>
  <span class="pill" id="env"></span>
  <!-- Each tab's own search/sort row, centered in the top bar — only the active tab's shows. -->
  <div id="headerTools" class="header-tools">
    <div id="ht-orders" class="ht-group">
      <div class="toolbar" id="listbar">
        <div class="sortwrap" id="sortWrap">
          <button class="sortbtn-dd" id="sortBtn" type="button" onclick="toggleSortMenu(event)">
            Sort by: <b id="sortLabel">Origin state</b><span class="caret">▾</span>
          </button>
          <button class="sortdir" id="sortDir" type="button" title="Toggle sort direction"
                  onclick="toggleSortDir(event)">↑</button>
          <div class="sortmenu profmenu" id="sortMenu" hidden></div>
        </div>
        <input id="q" type="search" placeholder="Filter by city, state, or VIN…">
        <button class="btn ghost" onclick="clearBoard()">Clear shipments</button>
        <span class="count" id="count"></span>
      </div>
    </div>
    <div id="ht-recorded" class="ht-group" hidden>
      <div class="sortwrap" id="recSortWrap">
        <button class="sortbtn-dd" id="recSortBtn" type="button" onclick="toggleRecSortMenu(event)">
          Sort by: <b id="recSortLabel">Updated</b><span class="caret">▾</span>
        </button>
        <button class="sortdir" id="recSortDir" type="button" title="Toggle sort direction"
                onclick="toggleRecSortDir(event)">↓</button>
        <div class="sortmenu profmenu" id="recSortMenu" hidden></div>
      </div>
      <input id="rq" type="search" placeholder="Search recorded by number, city, or VIN…" oninput="recDebounced()">
      <button class="btn ghost" onclick="loadRecorded()">Refresh</button>
      <span class="count" id="rstats"></span>
      <span class="count" id="rlive" style="color:#15803d"></span>
      <span class="count" id="rmeta" style="opacity:.7"></span>
    </div>
    <div id="ht-terminals" class="ht-group" hidden>
      <input id="tq" type="search" placeholder="Search terminals by name or address…" oninput="renderTerminals()">
      <button class="btn ghost" onclick="loadTerminals(true)">Refresh</button>
      <span class="count" id="tstats"></span>
    </div>
  </div>
  <div class="tabs">
    <div id="tally" class="tally"></div>
    <span id="navpost" class="navpost"><button class="btn ghostpost" disabled>Post to SuperDispatch</button></span>
  </div>
</header>

<div class="wrap">
  <!-- ORDERS -->
  <div class="panel active" id="orders">
    <div class="orders-layout">
      <div class="orders-main">
        <div class="routehdr" id="routehdr" style="display:none">
          <button class="btn ghost" onclick="backToList()">← All shipments</button>
          <span class="rlabel" id="routelabel"></span>
          <span class="count" id="routecount"></span>
        </div>
        <div class="board" id="board">
          <div id="list"></div>
          <div class="board-detail" id="detail" aria-hidden="true"></div>
        </div>
      </div>
      <aside class="spares" id="spares"
             ondragover="onSpareOver(event)" ondragleave="onSpareLeave(event)" ondrop="onSpareDrop(event)">
        <div class="side-title">Spare VINs <span class="n" id="spareCount">0</span></div>
        <div id="spareList"></div>
      </aside>
    </div>
  </div>

  <!-- RECORDED (local Super Dispatch shipment mirror) -->
  <div class="panel" id="recorded">
    <div class="term-main">
      <div id="rlist" class="rec-list"></div>
    </div>
  </div>

  <!-- TERMINALS -->
  <div class="panel" id="terminals">
    <div class="term-main">
      <div id="tlist" class="term-list"></div>
    </div>
  </div>

  <!-- USERS (Edit users) -->
  <div class="panel" id="users">
    <div class="users-layout">
      <div class="users-main">
        <div class="users-bar">
          <h2 class="users-h">Settings</h2>
          <button class="btn" onclick="addUser()">+ Add user</button>
          <button class="btn ghost" onclick="saveAllUsers()">Save all</button>
          <span class="count" id="usersMsg"></span>
        </div>
        <div id="usersList"></div>
        <datalist id="usStatesList"></datalist>
      </div>
      <aside class="users-side">
        <div class="side-title">Unclaimed states <span class="uc-count" id="unclaimedCount"></span></div>
        <div id="unclaimedList" class="unclaimed"></div>
      </aside>
    </div>
  </div>
</div>
  </div><!-- /appmain -->
</div><!-- /appshell -->

<div id="actionbar">
  <span id="selinfo"></span>
  <button class="btn" id="splitBtn" onclick="doSplit()">Split into new shipment</button>
  <button class="btn green" id="combineBtn" onclick="doCombine()">Combine</button>
  <button class="btn ghost" id="spareBtn" onclick="doSpare()">Save to spare</button>
  <button class="btn ghost" onclick="clearSel()">Clear</button>
</div>
<div id="placebar">
  <span id="placeinfo"></span>
  <button class="btn create" id="createBtn" onclick="createFromSpare()">Create new shipment</button>
  <button class="btn ghost" onclick="cancelPlace()">Cancel</button>
</div>
<div id="toast"></div>

<div id="pasteModal" class="pastemodal" hidden onclick="if(event.target===this)closePaste()">
  <div class="pastebox">
    <div class="pastehdr">Add shipments</div>
    <div class="pastesub">Select cells in Excel/Sheets and copy, then click a cell below and paste
      (Ctrl/Cmd&nbsp;+&nbsp;V) — they drop into the grid like a spreadsheet. Include the header row,
      or paste data only and your last sheet's headers are reused.</div>
    <div class="pastegrid-wrap">
      <table class="pastegrid" id="pasteGrid"></table>
    </div>
    <div class="pasterow">
      <button class="btn green" onclick="submitPaste()">Load &amp; run</button>
      <button class="btn" onclick="closePaste();pickAndRun()" title="Pick an .xlsx file instead of pasting">file+</button>
      <button class="btn ghost" onclick="clearPasteGrid()">Clear</button>
      <button class="btn ghost" onclick="closePaste()">Cancel</button>
      <span id="pasteMsg" class="pastemsg"></span>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
// small padlock used to mark locked (already-on-SuperDispatch) VIN bubbles
const LOCK='<svg width="9" height="11" viewBox="0 0 9 11" aria-hidden="true" style="flex:none">'
  +'<rect x="1" y="4.6" width="7" height="5.4" rx="1.2" fill="currentColor"/>'
  +'<path d="M2.4 4.6V3.1a2.1 2.1 0 0 1 4.2 0v1.5" fill="none" stroke="currentColor" stroke-width="1.1"/></svg>';
let ORDERS = [];
let UNPOSTABLE = [];             // Excel VINs Tesla had no BOL for — shown grayed at top
let DUP_REMOVED = [];            // VINs dropped from the board for already being live on SD
let DUP_DETAIL = {};            // vin -> route info for the focused 'duplicates removed' view
let SPARES = [];                 // set-aside VINs (the third column), off the board
let PENDING = null;              // a spare VIN being placed (click-to-place flow)
let CSEARCH = {orders:[]};       // last Super Dispatch VIN-search payload
let CMATCHES = [];               // discovered SD orders (annotated w/ board-route matches)
let CSTAGED = [];                // queued VIN->existing-order merges (consolidations.json)
let VIEW = {mode:'list'};        // or {mode:'route', key, label}
let SEL = new Set();             // selected VINs (route view)
let SORT = {key:'origin', dir:1};    // default sort: Origin state (A→Z); -1 = reversed

document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  const tab=t.dataset.tab;
  t.classList.add('active'); $('#'+tab).classList.add('active');
  if(tab==='terminals') loadTerminals();
  if(tab==='users'){ USERS_EDIT=JSON.parse(JSON.stringify(PROFILES||[]));
    const m=$('#usersMsg'); if(m) m.textContent=''; renderUsersEditor(); }   // Settings = edit users
  const onRecorded = tab==='recorded';
  const rn = $('#recNav'); if(rn) rn.hidden = !onRecorded;   // status groups stay Recorded-only
  // Centered header slot shows ONLY the active tab's own toolbar group.
  ['orders','recorded','terminals'].forEach(k=>{ const g=$('#ht-'+k); if(g) g.hidden = (k!==tab); });
  if(onRecorded){ loadRecorded(); startRecPoll(); } else { stopRecPoll(); }
});

// ---- Recorded shipments (local Super Dispatch mirror) ----------------------
let REC = {status:'all', q:'', sort:'updated', dir:'desc'};   // default: most-recently updated on top
const REC_SORT_OPTS = [{k:'updated',label:'Updated'},{k:'created',label:'Created'},
                       {k:'number',label:'Order #'},{k:'status',label:'Status'}];
function recSortLabel(){ const o=REC_SORT_OPTS.find(x=>x.k===REC.sort); return o?o.label:REC.sort; }
function renderRecSortMenu(){ const m=$('#recSortMenu'); if(!m) return;
  m.innerHTML=REC_SORT_OPTS.map(o=>`<div class="pm-item${o.k===REC.sort?' active':''}" onclick="pickRecSort('${o.k}')">${o.label}</div>`).join(''); }
function toggleRecSortMenu(ev){ if(ev) ev.stopPropagation(); const m=$('#recSortMenu'); if(!m) return;
  renderRecSortMenu(); m.hidden=!m.hidden; if(!m.hidden) document.addEventListener('click', closeRecSortMenu); }
function closeRecSortMenu(){ const m=$('#recSortMenu'); if(m) m.hidden=true; document.removeEventListener('click', closeRecSortMenu); }
function pickRecSort(k){ closeRecSortMenu(); REC.sort=k; REC.dir='desc'; loadRecorded(); }
function toggleRecSortDir(ev){ if(ev) ev.stopPropagation(); REC.dir = REC.dir==='desc'?'asc':'desc'; loadRecorded(); }
function syncRecSortUI(){ const l=$('#recSortLabel'); if(l) l.textContent=recSortLabel();
  const d=$('#recSortDir'); if(d){ d.textContent=REC.dir==='desc'?'↓':'↑';
    d.title=REC.dir==='desc'?'Descending (newest first) — click to reverse':'Ascending (oldest first) — click to reverse'; } }
let _recTimer = null;
let _recPoll = null;
// Order the status groups follow the SD lifecycle, not just count, in the left column.
const REC_ORDER = ['new','posted','requests','pending','accepted','picked_up',
                   'delivered','invoiced','paid','canceled','archived'];
function recDebounced(){ clearTimeout(_recTimer); _recTimer=setTimeout(loadRecorded, 250); }
// Poll while the Recorded tab is open so webhook updates show up live (~8s).
function startRecPoll(){ stopRecPoll(); _recPoll=setInterval(()=>{ if($('#recorded').classList.contains('active')) loadRecorded(true); }, 8000); }
function stopRecPoll(){ if(_recPoll){ clearInterval(_recPoll); _recPoll=null; } }
function recEsc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtCreated(iso){ if(!iso) return '—';
  const d=new Date(String(iso).replace(' ','T')); if(isNaN(d)) return '—';
  return d.toLocaleDateString(undefined,{year:'2-digit',month:'short',day:'numeric'}); }
function fmtUpdated(ep){ if(!ep) return '—'; const d=new Date(Number(ep)*1000); if(isNaN(d)) return '—';
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }
async function loadRecorded(silent){
  REC.q = ($('#rq')||{}).value || '';
  syncRecSortUI();
  const u = new URL(location.origin + '/api/recorded');
  if(REC.status && REC.status!=='all') u.searchParams.set('status', REC.status);
  if(REC.q) u.searchParams.set('q', REC.q);
  u.searchParams.set('sort', REC.sort); u.searchParams.set('dir', REC.dir);
  let data;
  try{ data = await (await fetch(u)).json(); }
  catch(e){ if(!silent) $('#rlist').innerHTML = '<div class="rec-empty">Could not load recorded shipments.</div>'; return; }
  if(data.error){ $('#rstats').textContent = data.error; }
  renderRecNav(data.counts||{}, data.total||0);
  const m = data.meta||{};
  $('#rmeta').textContent = m.at ? ('backfill '+m.at+' · '+(m.window?m.window[0]+'→'+m.window[1]:'')) : '';
  $('#rlive').textContent = '● live';   // polling is active while this tab is open
  const orders = data.orders||[];
  $('#rstats').textContent = orders.length + ' shown' + (data.total? (' of '+data.total+' recorded'):'');
  if(!orders.length){ $('#rlist').innerHTML = '<div class="rec-empty">No recorded shipments yet. Run: <code>python recorder_backfill.py</code></div>'; return; }
  const rows = orders.map(o=>{
    // Route shows just "City, ST → City, ST" (no zip); ST is already a 2-letter code.
    const loc = (c,st)=>[(c||'').trim(),(st||'').trim()].filter(Boolean).join(', ');
    const route = recEsc(loc(o.pickup_city,o.pickup_state)) +
                  ' <span class="arr">→</span> ' +
                  recEsc(loc(o.delivery_city,o.delivery_state));
    const vins = (o.vins||[]).map(v=>'<span class="vin">'+recEsc(v)+'</span>').join(' ');
    const dates = recEsc((o.pickup_date||'')+(o.delivery_date?(' → '+o.delivery_date):''));
    return `<tr>
      <td class="rnum">${recEsc(o.number||'')}</td>
      <td><span class="rbadge rb-${recEsc(o.status||'')}">${recEsc(o.status||'')}</span></td>
      <td class="rroute">${route}</td>
      <td class="rvins">${vins}</td>
      <td class="rdate">${dates}</td>
      <td class="rdate">${recEsc(fmtCreated(o.created_at))}</td>
      <td class="rdate">${recEsc(fmtUpdated(o.updated_at))}</td>
    </tr>`;
  }).join('');
  const sortHint = (k)=> REC.sort===k ? (' '+(REC.dir==='desc'?'↓':'↑')) : '';
  $('#rlist').innerHTML =
    `<table class="rec-table"><thead><tr>
       <th>Order${sortHint('number')}</th><th>Status${sortHint('status')}</th><th>Route</th>
       <th>VIN(s)</th><th>Pickup → Delivery</th>
       <th>Created${sortHint('created')}</th><th>Updated${sortHint('updated')}</th>
     </tr></thead><tbody>${rows}</tbody></table>`;
}
// Status groups live in the LEFT column (nav rail), ordered by SD lifecycle.
function renderRecNav(counts, total){
  const known = REC_ORDER.filter(s=>counts[s]!=null);
  const extra = Object.keys(counts).filter(s=>!REC_ORDER.includes(s)).sort();
  const order = known.concat(extra);

function money(p){ return p==null?'—':'$'+Number(p).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(iso){ const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function fmtWin(w){ if(!w||!w.latest) return '—';
  return w.earliest===w.latest ? fmtDate(w.latest) : fmtDate(w.earliest)+'–'+fmtDate(w.latest); }
// Format a full SD datetime (e.g. "2026-06-13T16:00:00.000+0000") as a short date.
// SD stamps these in UTC, so read the calendar date straight off the string rather
// than letting new Date() drift it into the browser's timezone (off-by-one).
function fmtSDDate(iso){ if(!iso) return '';

// ----- need-by helpers (ts = epoch seconds; null = no date, sorts last) -----
function needTs(o){ return (o.need_by_ts==null)? Infinity : o.need_by_ts; }
function needFmt(ts){
  if(ts==null) return '';
  return new Date(ts*1000).toLocaleString(undefined,
    {month:'short',day:'2-digit',hour:'numeric',minute:'2-digit'});
}
function needCls(ts){
  if(ts==null) return 'nb-none';
  const now=Date.now()/1000;
  if(ts<now) return 'nb-over';                 // past due / delivered -> most urgent
  if(ts-now < 48*3600) return 'nb-soon';       // within 2 days
  return '';
}
function needChip(ts, raw){
  const label = ts==null ? 'no need-by' : (needFmt(ts) + (ts<Date.now()/1000?' • overdue':''));
  return `<span class="need ${needCls(ts)}" title="${raw||''}">${label}</span>`;
}
// VINs of a shipment bucketed by due DATE (date only) with a count each, sorted soonest-first.
function dayKey(ts){ const d=new Date(ts*1000); return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); }
function dueBuckets(o){
  const map=new Map();
  (o.vehicles||[]).forEach(v=>{
    const ts=(v.need_by_ts==null)?null:v.need_by_ts;
    const k=ts==null?'none':dayKey(ts);
    if(!map.has(k)) map.set(k,{ts, count:0});
    map.get(k).count++;
  });
  return [...map.values()]
    .sort((a,b)=>(a.ts==null?Infinity:a.ts)-(b.ts==null?Infinity:b.ts))
    .map(b=>({count:b.count, cls:needCls(b.ts),
      label: b.ts==null?'no date':new Date(b.ts*1000).toLocaleDateString(undefined,{month:'short',day:'2-digit'})}));
}

// ----------------------- rendering -----------------------
// soonest need-by across a shipment's units (epoch sec), or null if none.
function soonestTs(o){
  let best=null;
  (o.vehicles||[]).forEach(v=>{ if(v.need_by_ts!=null) best=(best==null)?v.need_by_ts:Math.min(best,v.need_by_ts); });
  if(best==null && o.need_by_ts!=null) best=o.need_by_ts;
  return best;
}
// The Tesla VIN's 4th character encodes the model line. C = Cybertruck, A =
// Cybercab; otherwise the char itself is the badge (3 / S / X / Y). Falls back to
// the model name when the VIN is missing or oddly shaped.
function vehTag(v){
  const c=(v.vin||'')[3];
  if(c){ const u=c.toUpperCase();
    if(u==='C') return {tag:'CT', cls:'ct', name:'Cybertruck'};
    if(u==='A') return {tag:'(CAB)', cls:'cc', name:'Cybercab'};
    if('3SXY'.includes(u)) return {tag:u, cls:'', name:'Model '+u}; }
  const mt=(v.model||'').replace(/model/i,'').trim();
  return {tag:(mt[0] || (v.model||'?')[0] || '?').toUpperCase(), cls:'', name:v.model||'?'};
}
// One rectangular tag per vehicle, all bundled into the shipment's tray — the
// units that make up this route's shipment.
function vinBubbles(o){
  return (o.vehicles||[]).map(v=>{
    const t=vehTag(v);
    const title=[v.year, v.make, t.name, v.vin].filter(Boolean).join(' ');
    return `<span class="vbub ${t.cls}" title="${title}"><span>${t.tag}</span></span>`;
  }).join('');
}
// Strongest SD loadboard status the scan saw on this zip-pair route (independent of the
// stricter street-level consolidation match). Lets a route light up whenever the
// loadboard has a posted/accepted shipment on it, which is what we actually want to see.
function routeHitStatus(key){
  const hits=((CSEARCH&&CSEARCH.route_hits)||[]).filter(h=>h.route===key);
  if(hits.some(h=>h.loadboard_status==='posted')) return 'posted';
  if(hits.some(h=>h.loadboard_status==='accepted')) return 'accepted';
  return '';
}
// Tint a route row when the loadboard has a shipment on this route: AMBER if any are
// posted (amber wins when both are present), else GREEN for accepted-only. Uses ONLY the
// street-matched consolidation candidates — the SAME set the route detail shows on click —
// so a coloured route always has an actual load behind it. (We deliberately do NOT colour
// from the coarse zip-pair scan hits: many terminals share a zip, so a zip-pair match
// without a street match would light up a route that shows nothing when opened.)
function routeSdClass(o){
  const m=matchesForRoute(routeKey(o));
  if(m.some(x=>x.loadboard_status==='posted' || x.is_posted_to_loadboard)) return 'sd-amber';
  if(m.some(x=>x.loadboard_status==='accepted')) return 'sd-green';
  return '';
}
// ----- unread state (Gmail-like): a shipment is "unread" until you open it.
// Persisted per browser; pruned to the current board so a fresh run re-flags them. -----
const READ = new Set(JSON.parse(localStorage.getItem('readShipments')||'[]'));
function isUnread(num){ return !!num && !READ.has(num); }
function markRead(num){ if(num && !READ.has(num)){ READ.add(num); localStorage.setItem('readShipments', JSON.stringify([...READ])); } }
function pruneRead(nums){           // drop read-state for shipments no longer on the board
  let changed=false;
  for(const n of [...READ]) if(!nums.has(n)){ READ.delete(n); changed=true; }
  if(changed) localStorage.setItem('readShipments', JSON.stringify([...READ]));

  tlist.innerHTML = groups.length ? groups.map((g,i)=>termRow(g,i)).join('') : '<div class="empty">No terminals match your search.</div>';
}

// ----- consolidation helpers (Super Dispatch existing-order matching) -----
function venueOf(leg){ return (leg && leg.venue) || leg || {}; }
// Where a stop's venue data came from. Each stop has EXACTLY ONE source, so a stop only
// ever shows its own badge. Four labels (db + added both come from our terminal DB):
//   SD terminal (green) — matched a terminal in our SuperDispatch terminal database
//   SD link     (green) — name linked (by exact address) to an SD terminal
//   Tesla BOL   (red)   — pulled straight from this run's Tesla BOL (no DB match)
//   Excel       (grey)  — no DB match; using this row's own Excel address/contact/phone
function srcBadge(leg){
  const s = leg && leg.source;
  if(s==='db' || s==='added') return '<span class="srcbadge db" title="Matched a terminal in your SuperDispatch terminal database">SD terminal</span>';
  if(s==='linked') return '<span class="srcbadge linked" title="This name was linked (by exact address) to an SD terminal — pulling its info">SD link</span>';
  if(s==='bol')    return '<span class="srcbadge bol" title="Pulled from this run\'s Tesla BOL — no matching terminal in the database">Tesla BOL</span>';
  if(s==='excel')  return '<span class="srcbadge excel" title="No matching terminal in the database — using this row\'s own Excel address/contact/phone">Excel</span>';
  return '';
}
function venueLabel(leg){ const v=venueOf(leg);
  return [v.city, [v.state, v.zip].filter(Boolean).join(' ')].filter(Boolean).join(', ') || '?'; }
function venueRoute(p, d){ return venueLabel(p) + ' → ' + venueLabel(d); }
// the EXACT address: venue name + street line + city/state/zip (+ contact)
function venueFull(leg){ const v=venueOf(leg);
  const street=[v.address, venueLabel(leg)].filter(x=>x && x!=='?').join(', ');
  return {name:v.name||'', street:street||'(no address)',
          contact:[v.contact_name, v.contact_phone].filter(Boolean).join(' · ')}; }
function addrBlock(label, leg){ const a=venueFull(leg);
  return `<div class="caddr"><span class="al">${label}${srcBadge(leg)}</span>
    <span class="astreet">${a.name?`<b>${a.name}</b> — `:''}${a.street}</span>
    ${a.contact?`<span class="acontact">${a.contact}</span>`:''}</div>`; }
function matchesForRoute(key){
  return CMATCHES.filter(o => o.is_candidate && (o.matches_board_routes||[]).includes(key));
}
function stagedFor(guid){ return CSTAGED.find(s => s.order_guid===guid); }

// SD Matches tab: read-only card per discovered SD order — same route-bubble +
// addresses + locked VIN bubbles format as the focused-route card.
function consolCard(o){

// route-view card for an EXISTING SD shipment on the focused route — laid out like
// a board shipment: route bubble on top, exact addresses, then VIN bubbles. Ring is
// yellow if posted, green if accepted. Drop target for to-be VINs (staging).
function sdVinBub(v){          // locked, amber bubble for a VIN ALREADY on SuperDispatch
  return `<span class="vinbub sd" draggable="false" title="${v.vin||''} — already on SuperDispatch (locked)">`
    +`${LOCK}<span class="mt">${vehTag(v).tag}</span>${v.vin||''}</span>`;
}
function vehDesc(v){ return [v.year, v.make, v.model].filter(x=>x && x!=='Tesla').join(' ') || '—'; }
// One leg (Pickup/Delivery) inside the location bubble: address cohesive over 2-3
// lines (name / street / city, ST zip), contact underneath on its own line(s).
function legBlock(label, leg){
  const v=venueOf(leg);
  const cityZip=[v.city, [v.state, v.zip].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  const addr=[v.name, v.address, cityZip].filter(Boolean);
  const contact=[v.contact_name, v.contact_phone].filter(Boolean);
  return `<div class="loc">
    <div class="loc-h">${label}${srcBadge(leg)}</div>
    <div class="loc-addr">${addr.map(l=>`<div>${l}</div>`).join('') || '<div class="muted">—</div>'}</div>
    ${contact.length?`<div class="loc-contact">${contact.map(l=>`<div>${l}</div>`).join('')}</div>`:''}
  </div>`;
}
// VINs as full-line bubbles, exactly like the excel VIN rows — color-coded by the
// shipment's loadboard status (amber posted / green accepted). SD ones are LOCKED
// (not draggable, no delete); to-be ones are accent with a remove button.
function sdVinLine(v, ring){

    <span class="vdesc">${vehDesc(v)}</span><span class="bvin">${vin}</span>

function addVinLine(a){
