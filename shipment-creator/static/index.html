// The shared route location bubble at the top of a focused route — pickup/delivery
// addresses + contacts shown ONCE (every shipment here is on the same route),
// titled by the route. `o` is any shipment on the route (board or SD).
// Expandable Shipment Comments (from the BOL): pickup/delivery carrier notes,
// formatted like the contact info. Hidden when there are no notes.
function routeNotes(o){
  const pn=(o&&o.pickup_notes||'').trim(), dn=(o&&o.delivery_notes||'').trim();
  if(!pn && !dn) return '';
  // ALWAYS render both columns so each note sits under its own terminal: pickup on the
  // LEFT, delivery on the RIGHT. The empty side stays a blank placeholder rather than
  // collapsing (which would slide delivery notes over to the left).
  const block=(label,txt)=>
    `<div class="loc">${txt
      ? `<div class="loc-h">${label} notes</div><div class="loc-contact">${escHtml(txt)}</div>`
      : ''}</div>`;
  return `<details class="rnotes">
    <summary>Shipment comments</summary>
    <div class="routeloc-grid">${block('Pickup',pn)}${block('Delivery',dn)}</div>
  </details>`;
}
function routeLocBubble(o){
  return `<div class="routeloc">
    <div class="routeloc-title">${escHtml(routeLabel(o))}</div>
    <div class="routeloc-grid">${legBlock('Pickup', o.pickup)}${legBlock('Delivery', o.delivery)}</div>
    ${routeNotes(o)}
  </div>`;
}
// An existing SD shipment on the focused route — same layout as a regular board
// shipment card (head + VIN rows), just color-coded (amber posted / green accepted).
// Addresses live in the shared route bubble above, so they're not repeated here.
function matchCard(o){
  const existing=o.vehicles||[];
  const st=stagedFor(o.guid), adds=(st&&st.add)||[];
  const g=esc(o.guid);
  const accepted = o.loadboard_status==='accepted';
  const ring = accepted ? 'accepted' : 'posted';
  const lines = existing.map(v=>sdVinLine(v, ring)).join('') + adds.map(addVinLine).join('');
  // Accepted orders are locked: a carrier already took the load, so no VINs can be added.
  const note = accepted
    ? '<div class="vrow sdlocked muted">Accepted by a carrier — VINs can\'t be added</div>'
    : (adds.length ? '' : '<div class="vrow sddrop muted">drag your to-be VINs here</div>');
  const dropAttrs = accepted ? ''
    : `ondragover="onMatchOver(event)" ondragleave="onMatchLeave(event)" ondrop="onMatchDrop(event,'${g}')"`;
  return `<div class="card matchcard ${ring}${accepted?' locked':''}" data-guid="${o.guid}" ${dropAttrs}>
    <div class="head">
      <span class="num">${o.number||'(no #)'}</span>
      <span class="dates" title="Scheduled on SuperDispatch">Pickup <b>${sdLegWindow(o.pickup)}</b> · Delivery <b>${sdLegWindow(o.delivery)}</b></span>
      <span class="cnt">${existing.length+adds.length} unit${(existing.length+adds.length)===1?'':'s'}</span>
      ${matchPriceField(o)}
    </div>
    <div class="bubbles">${lines||'<div class="vrow muted">no VINs</div>'}${note}</div>
  </div>`;
}

// ----- spare workspace (third column) — one row per set-aside VIN, showing its
// route (in place of the shipment's model bar) plus its single vehicle-type tag.
function spareRow(s){
  const p=(s.pickup&&s.pickup.venue)||{}, d=(s.delivery&&s.delivery.venue)||{};
  const route=`${p.city||p.state||'?'} → ${d.city||d.state||'?'}`;
  const t=vehTag(s);
  const pend=PENDING===s.vin?' pending':'';
  return `<div class="spare-row${pend}" draggable="true" data-vin="${s.vin||''}"
      onclick="placeSpare('${esc(s.vin)}')"
      ondragstart="onSpareDragStart(event,'${esc(s.vin)}')" ondragend="onDragEnd(event)"
      title="${[s.year,s.make,t.name,s.vin].filter(Boolean).join(' ')}${s.from_number?' — was '+s.from_number:''} · click to place">
    <span class="vbubs"><span class="vbub ${t.cls}"><span>${t.tag}</span></span></span>
    <div class="spare-meta">
      <div class="spare-route">${route}</div>
      <div class="spare-sub">${s.vin||''}</div>
    </div>
    <button class="copyvin" title="Copy VIN" onclick="copyVin(event,'${esc(s.vin)}')">Copy VIN</button>
    <button class="spare-ret" title="Quick return to board" onclick="event.stopPropagation();restoreSpare('${esc(s.vin)}')">↩</button>
  </div>`;
}
function renderSpares(){
  $('#spareCount').textContent=SPARES.length;
  $('#spareList').innerHTML = SPARES.length ? SPARES.map(spareRow).join('')
    : '<div class="spare-empty">Drag VINs here (or use “Save to spare”) to set them aside. They stay off the board and won’t be posted.</div>';
}
function sortOrders(list){
  const arr=[...list];
  if(SORT.key==='urgency'){ arr.sort((a,b)=>needTs(a)-needTs(b)); }
  else {
    const pick = SORT.key==='origin'
      ? o=>(((o.pickup&&o.pickup.venue)||{}).state||'')
      : o=>(((o.delivery&&o.delivery.venue)||{}).state||'');
    arr.sort((a,b)=>{
      const sa=pick(a), sb=pick(b);
      if(!sa && !sb) return needTs(a)-needTs(b);
      if(!sa) return 1;                          // blank state always sorts last
      if(!sb) return -1;
      const r=sa.localeCompare(sb)*SORT.dir;
      return r || (needTs(a)-needTs(b));         // tie-break within a state: soonest-first
    });
  }
  // Float SD-matched cards to the very top: posted (amber) first, then accepted (green), then the
  // rest. The chosen sort is preserved WITHIN each group (Array.sort is stable). rank computed once.
  const rankOf=new Map();
  arr.forEach(o=>{ const c=routeSdClass(o); rankOf.set(o, c==='sd-amber'?0:(c==='sd-green'?1:2)); });
  arr.sort((a,b)=>rankOf.get(a)-rankOf.get(b));
  return arr;
}
const SORT_OPTS=[{k:'urgency',label:'Most urgent'},{k:'origin',label:'Origin state'},{k:'dest',label:'Destination state'}];
function updateSortUI(){
  const lbl=$('#sortLabel'); if(lbl){ const o=SORT_OPTS.find(x=>x.k===SORT.key); lbl.textContent=o?o.label:SORT.key; }
  const dir=$('#sortDir'); if(dir){ const isUrg=SORT.key==='urgency';
    dir.style.visibility=isUrg?'hidden':'visible';
    dir.textContent=SORT.dir>0?'↑':'↓';
    dir.title=SORT.dir>0?'Ascending (A→Z) — click to reverse':'Descending (Z→A) — click to reverse'; }
}
function renderSortMenu(){ const m=$('#sortMenu'); if(!m) return;
  m.innerHTML=SORT_OPTS.map(o=>`<div class="pm-item${o.k===SORT.key?' active':''}" onclick="pickSort('${o.k}')">${o.label}</div>`).join(''); }
function toggleSortMenu(ev){ if(ev) ev.stopPropagation(); const m=$('#sortMenu'); if(!m) return;
  if(m.hidden){ renderSortMenu(); m.hidden=false; document.addEventListener('click', closeSortMenu); } else closeSortMenu(); }
function closeSortMenu(){ const m=$('#sortMenu'); if(m) m.hidden=true; document.removeEventListener('click', closeSortMenu); }
function pickSort(k){ closeSortMenu(); SORT={key:k, dir:1}; render(); }
function toggleSortDir(ev){ if(ev) ev.stopPropagation(); if(SORT.key==='urgency') return; SORT.dir*=-1; render(); }
// A route can be FULLY consolidated — all its excel VINs staged onto an existing SD
// shipment, leaving no board order. Those routes would otherwise vanish from the list;
// these "ghost" rows keep them visible (and reachable) so the consolidation isn't lost.
function stagedRouteKey(s){ return (venueOf(s.pickup).zip||'')+'|'+(venueOf(s.delivery).zip||''); }
function stagedRouteLabel(s){ const p=venueOf(s.pickup), d=venueOf(s.delivery);
  return `${p.city||'?'}, ${p.state||''} → ${d.city||'?'}, ${d.state||''}`; }
function consolGhostRow(s){
  const key=stagedRouteKey(s), p=venueOf(s.pickup), d=venueOf(s.delivery);
  const route=`<b>${p.city||'?'}, ${p.state||''}</b> → <b>${d.city||'?'}, ${d.state||''}</b>`;
  const match=CMATCHES.find(o=>o.guid===s.order_guid);
  const sd=(match && match.loadboard_status==='accepted')?'sd-green':'sd-amber';
  const bubbles=(s.add||[]).map(a=>{const t=vehTag(a); return `<span class="vbub ${t.cls}"><span>${t.tag}</span></span>`;}).join('');
  return `<div class="lrow ${sd}" title="${s.add.length} VIN(s) consolidated onto existing SuperDispatch order ${s.number||''} — open to view"
      onclick="openRouteByKey('${esc(key)}','${esc(stagedRouteLabel(s))}')">
    <span class="lroute">${route}</span>
    <div class="vbubs">${bubbles}</div>
    <span class="chev">›</span>
  </div>`;
}
function renderList(){
  $('#listbar').style.display=''; $('#routehdr').style.display='none';
  const q=$('#q').value.trim().toLowerCase();
  const hits=ORDERS.filter(o=>!q||JSON.stringify(o).toLowerCase().includes(q));
  let sorted=sortOrders(hits);
  // routes the board already covers; ghost rows for staged-only routes (no board order left)
  const boardKeys=new Set(ORDERS.map(routeKey)), seen=new Set();
  const ghosts=CSTAGED.filter(s=>{
    if(!(s.add&&s.add.length)) return false;
    const k=stagedRouteKey(s);
    if(boardKeys.has(k)||seen.has(k)) return false;
    seen.add(k); return !q||JSON.stringify(s).toLowerCase().includes(q);
  });
  // Pull shipments with ANY Excel-only stop into a pinned "Review" group at the very top.
  const review=sorted.filter(hasExcelStop), rest=sorted.filter(o=>!hasExcelStop(o));
  const total=sorted.length+ghosts.length;
  $('#count').textContent=total+' shipment'+(total===1?'':'s');
  const reviewHtml = review.length
    ? `<div class="reviewsec"><div class="reviewhdr">⚠ Review — ${review.length} shipment${review.length===1?'':'s'} with `
      +`Excel-only terminal info (no DB match — open to verify)</div>${review.map(listRow).join('')}</div>`
    : '';
  $('#list').innerHTML=dupSlice()+unpostableSection()+reviewHtml+(rest.length||ghosts.length
    ? rest.map(listRow).join('')+ghosts.map(consolGhostRow).join('')
    : (review.length ? '' : '<div class="empty">No staged shipments. Click <b>Excel +</b> (top bar) to choose a sheet and start.</div>'));
  // keep the detail open as long as its route still has a board order OR a posted/accepted match
  if(SELECTED_ROUTE && !ORDERS.some(o=>routeKey(o)===SELECTED_ROUTE) && !matchesForRoute(SELECTED_ROUTE).length) closeDetail();
  if(SELECTED_DUP) renderDupDetail(false);     // refresh the focused dup view in place
  updateSortUI(); updateBar();
}
// VINs Tesla had no BOL for — pinned at the very top, grayed and non-interactive (can't be
// dragged, selected, or posted). Copy VIN is the only affordance, to look them up by hand.
function unpostableSection(){
  if(!UNPOSTABLE.length) return '';

      <span class="vdesc">${vehDesc(v)}</span><span class="bvin">${v.vin||''}</span>
      <button class="copyvin" title="Copy VIN" onclick="copyVin(event,'${esc(v.vin)}')">Copy VIN</button></div>`).join('');

    <div>${rows}</div>

function renderRoute(){
  $('#listbar').style.display='none'; $('#routehdr').style.display='flex';
  $('#routelabel').textContent=VIEW.label;
  const mates=ORDERS.filter(o=>routeKey(o)===VIEW.key).sort((a,b)=>needTs(a)-needTs(b));
  const matchOrders=matchesForRoute(VIEW.key);
  const matchHtml=matchOrders.map(matchCard).join('');
  if(!mates.length && !PENDING && !matchHtml){ backToList(); return; }   // nothing to show -> bail
  $('#routecount').textContent=mates.length+' shipment'+(mates.length===1?'':'s')+' on this route';
  // shared pickup/delivery dialogue once at the top (from any shipment on the route)

  const locHtml = headOrder ? routeLocBubble(headOrder) : '';
  const boardHtml = mates.length ? mates.map(routeCard).join('')
    : (PENDING ? `<div class="empty-route">
        <div class="muted">No shipment on this route yet — start one for this VIN.</div>
        <button class="btn create" onclick="createFromSpare()">Create new shipment</button>
      </div>` : '');

}
// Foundation: run a DOM update inside a named View Transition (scoped via data-vt so the
// CSS animates only this action). Falls back to a plain render where unsupported.
function vtRender(name, fn){
  fn = fn || render;
  if(!document.startViewTransition){ fn(); return; }
  const el=document.documentElement; el.dataset.vt=name;
  const t=document.startViewTransition(fn);
  t.finished.finally(()=>{ if(el.dataset.vt===name) delete el.dataset.vt; });
}
// ---- master-detail: click a card -> list makes room, that card's focused bubble slides in
// on its right. No page swap; the order list stays put on the left. ----
let SELECTED_NUM=null;       // the clicked order (drives the list highlight)
let SELECTED_ROUTE=null;     // the route the detail is showing — keyed on the ROUTE, not the
                             // order, so the detail survives the order being emptied/removed
let SELECTED_DUP=false;      // the focused detail is showing the 'duplicates removed' view
function selectCard(ev, number){
  const row=ev&&ev.currentTarget;
  if(SELECTED_NUM===number){ closeDetail(); return; }   // re-click closes
  const o=ORDERS.find(x=>x.number===number); if(!o) return;
  SELECTED_NUM=number; SELECTED_ROUTE=routeKey(o);
  SELECTED_DUP=false;                                  // leaving the focused dup view
  const sl=$('#dupslice'); if(sl) sl.classList.remove('active');
  document.querySelectorAll('#list .lrow.selected').forEach(e=>e.classList.remove('selected'));
  if(row) row.classList.add('selected');
  renderDetail(true);                       // animate on open only
  const bd=$('#board'); if(bd) bd.classList.add('split');
}
// Render the detail for the SELECTED ROUTE: shared address bubble + every board shipment on the
// route + the Split/Combine footer + the existing SD posted/accepted cards. Keyed on the route,
// so dragging a VIN onto a posted card (which can empty/remove the board order) leaves the detail
// open showing the posted card — it never jumps you to a different view.
function renderDetail(animate){
  const d=$('#detail'); if(!d||!SELECTED_ROUTE) return;
  const mates=ORDERS.filter(o=>routeKey(o)===SELECTED_ROUTE).sort((a,b)=>needTs(a)-needTs(b));
  const matchOrders=matchesForRoute(SELECTED_ROUTE);
  if(!mates.length && !matchOrders.length){ closeDetail(); return; }   // nothing left -> close
  if(!mates.some(o=>o.number===SELECTED_NUM)) SELECTED_NUM = mates.length ? mates[0].number : null;
  const head=mates[0]||matchOrders[0];
  d.innerHTML=`<div class="detail-inner${animate?' opening':''}">
    <div class="detail-head"><button class="btn ghost detail-x" onclick="closeDetail()">✕ Close</button></div>
    ${head?routeLocBubble(head):''}${mates.map(routeCard).join('')}
    <div class="vin-actions" id="vinActions" hidden>
      <span class="va-info" id="vaInfo"></span>
      <button class="btn" id="vaSplit" onclick="doSplit()">Split into new shipment</button>
      <button class="btn green" id="vaCombine" onclick="doCombine()">Combine</button>
      <button class="btn ghost" id="vaClear" onclick="clearSel()">Clear</button>
    </div>
    ${matchOrders.map(matchCard).join('')}</div>`;

}
// the selected-VIN footer in the detail (Split / Combine), driven by the SEL set
function updateDetailActions(){
  const bar=$('#vinActions'); if(!bar) return;
  const n=SEL.size;

  bar.hidden=false;
  const info=$('#vaInfo'); if(info) info.textContent=n+' VIN'+(n===1?'':'s')+' selected';
  const sp=$('#vaSplit'); if(sp) sp.disabled=n<1;

function closeDetail(){

  document.querySelectorAll('#list .lrow.selected').forEach(e=>e.classList.remove('selected'));
  const sl=$('#dupslice'); if(sl) sl.classList.remove('active');

async function load(){
  try{
    const [od,sp,cm]=await Promise.all([
      fetch('/api/orders').then(r=>r.json()),
      fetch('/api/spares').then(r=>r.json()),
      fetch('/api/consolidation/matches').then(r=>r.json()).catch(()=>({})),
    ]);
    ORDERS=od.orders||[]; UNPOSTABLE=od.unpostable||[]; SPARES=(sp&&sp.spares)||[];
    DUP_REMOVED=od.duplicates_removed||[];          // VINs dropped for already being live on SD
    DUP_DETAIL=od.duplicates_removed_detail||{};    // vin -> route info (for the focused view)
    CSEARCH=(cm&&cm.search)||{orders:[]}; CMATCHES=CSEARCH.orders||[]; CSTAGED=(cm&&cm.staged)||[];
    pruneRead(new Set(ORDERS.map(o=>o.number)));   // forget read-state for posted/removed shipments
    render(); syncTally();
  }
  catch(e){ $('#list').innerHTML='<div class="empty">Could not load orders.</div>'; }
}

// Scroll the order cards from ANYWHERE in the content (cards, the margins around them, the
// toolbar) — except when the wheel is over the detail, which scrolls itself.
(function(){ const area=document.querySelector('.wrap'); if(!area) return;
  area.addEventListener('wheel', e=>{
    if(e.target.closest && e.target.closest('#detail')) return;     // detail handles its own scroll
    const list=$('#list'); if(!list || list.scrollHeight<=list.clientHeight) return;
    list.scrollTop += e.deltaY; e.preventDefault();
  }, {passive:false});
})();

  if(SEL.has(vin)) SEL.delete(vin); else SEL.add(vin);
  document.querySelectorAll('.vrow[data-vin="'+CSS.escape(vin)+'"]')
    .forEach(r=>r.classList.toggle('sel', SEL.has(vin)));

function clearSel(){
  SEL.clear();

function updateBar(){
  updateDetailActions();                  // master-detail footer (Split/Combine under the VINs)
  const abar=$('#actionbar'), pbar=$('#placebar');
  // spare-placement dialogue takes over the bottom while a spare is being placed
  if(PENDING && VIEW.mode==='route'){
    abar.classList.remove('show');
    pbar.classList.add('show');
    $('#placeinfo').innerHTML='Placing <b>'+PENDING+'</b> — drag onto a shipment, or';
    return;
  }
  pbar.classList.remove('show');
  const n=SEL.size, inRoute=VIEW.mode==='route';
  if(!inRoute || n===0){ abar.classList.remove('show'); return; }
  abar.classList.add('show');
  $('#selinfo').textContent=n+' VIN'+(n===1?'':'s')+' selected';
  $('#splitBtn').disabled = n<1;
  $('#combineBtn').disabled = n<2;
  $('#spareBtn').disabled = n<1;
}
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.style.opacity=1;
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.style.opacity=0, 2800);
}
function copyVin(ev, vin){
  if(ev){ ev.stopPropagation(); }       // don't trigger the row's select/place click
  if(!vin) return;
  const ok=()=>toast('Copied '+vin), fail=()=>toast('Copy failed');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(vin).then(ok).catch(()=>fallbackCopy(vin,ok,fail));
  } else { fallbackCopy(vin, ok, fail); }
}
function fallbackCopy(text, ok, fail){
  try{ const ta=document.createElement('textarea'); ta.value=text;
    ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta); ok(); }
  catch(e){ fail(); }
}
async function api(url, body){
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){ let m=r.statusText; try{ m=(await r.json()).detail||m; }catch(e){} toast(m); throw new Error(m); }
  return r.json();
}

// ----- drag-and-drop: quick single-VIN move between same-route shipments -----
let DRAG=null;
function onDragStart(ev, number, vin){
  DRAG={kind:'board', from:number, vin};
  ev.dataTransfer.effectAllowed='move';
  ev.dataTransfer.setData('text/plain', vin);
  ev.currentTarget.classList.add('dragging');
}
function onSpareDragStart(ev, vin){          // dragging a spare back toward a shipment
  DRAG={kind:'spare', vin};
  ev.dataTransfer.effectAllowed='move';
  ev.dataTransfer.setData('text/plain', vin);
  ev.currentTarget.classList.add('dragging');
}
function onDragEnd(ev){ ev.currentTarget.classList.remove('dragging'); DRAG=null;
  if(_livePending){ _livePending=false; liveReload(); } }   // flush any update deferred during the drag
function onDragOver(ev, number){
  if(!DRAG) return;
  const t=ORDERS.find(o=>o.number===number);
  if(DRAG.kind==='spare'){                    // restore onto a same-route shipment
    const sp=SPARES.find(s=>s.vin===DRAG.vin);
    if(t && sp && routeKey(t)===routeKey(sp)){ ev.preventDefault(); ev.currentTarget.classList.add('drop-ok'); }
    return;
  }
  if(DRAG.from===number) return;
  const s=ORDERS.find(o=>o.number===DRAG.from);
  if(s && t && routeKey(s)===routeKey(t)){ ev.preventDefault(); ev.currentTarget.classList.add('drop-ok'); }
}
function onDragLeave(ev){ ev.currentTarget.classList.remove('drop-ok'); }
async function onDrop(ev, number){
  ev.currentTarget.classList.remove('drop-ok');
  if(!DRAG) return;
  ev.preventDefault();
  if(DRAG.kind==='spare'){
    try{ await api('/api/spare/restore',{vins:[DRAG.vin], to:number}); PENDING=null; await load();
      toast('Returned to '+number); }catch(e){}
    return;
  }
  if(DRAG.from===number) return;
  try{ await api('/api/move',{from:DRAG.from, to:number, vins:[DRAG.vin]}); await load();
    toast('VIN moved'); }catch(e){}
}
// drop a board VIN onto the spare column to set it aside
function onSpareOver(ev){ if(DRAG && DRAG.kind==='board'){ ev.preventDefault(); $('#spares').classList.add('drop-ok'); } }
function onSpareLeave(ev){ $('#spares').classList.remove('drop-ok'); }
async function onSpareDrop(ev){
  $('#spares').classList.remove('drop-ok');
  if(!DRAG || DRAG.kind!=='board') return;
  ev.preventDefault();
  try{ await api('/api/spare',{vins:[DRAG.vin]}); await load(); toast('Saved to spare'); }catch(e){}
}

// ----- dispatcher profiles (top-left dropdown) -----
let ACTIVE_PROFILE=null;
let PROFILES=[];

// CONCURRENCY: this window acts AS the dispatcher selected in its dropdown. Every
// /api call carries that dispatcher in an X-Profile header, so the server resolves
// THIS window's board + run independently of any other window. Two windows on two
// dispatchers => two independent pulls at the same time. We wrap window.fetch once so
// every existing call site (and the SSE excepted — it uses ?profile=) is covered.
(function(){
  const _fetch = window.fetch.bind(window);
  window.fetch = function(input, init){
    try{
      const url = (typeof input === 'string') ? input : (input && input.url) || '';
      if(ACTIVE_PROFILE && /^\/api\//.test(url)){
        init = Object.assign({}, init);
        const h = new Headers((init && init.headers) || (typeof input !== 'string' ? input.headers : undefined) || {});
        if(!h.has('X-Profile')) h.set('X-Profile', ACTIVE_PROFILE);
        init.headers = h;
      }
    }catch(e){ /* fall through to a plain fetch */ }
    return _fetch(input, init);
  };
})();
async function loadProfiles(){
  let d; try{ d=await fetch('/api/profiles').then(r=>r.json()); }catch(e){ return; }
  ACTIVE_PROFILE=d.active||null;
  PROFILES=d.profiles||[];
  renderProfilesEditor();
  renderProfMenu();
  profSetBtn();
  updateProfileImg();
}

// ----- Edit users page: name / phone / states per dispatcher + unclaimed states -----
const US_STATES=["AL","AK","AZ","AR","CA","CO","CT","DE","DC","FL","GA","HI","ID","IL","IN","IA",
  "KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND",
  "OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY"];
let USERS_EDIT=null;          // working copy while the editor page is open
// didi (like the old ALL) bypasses the state filter, so it has no editable states.
function isAllUser(u){ const id=(u.id||''); return id==='didi'||id==='all'; }
function claimedSet(){
  const s=new Set();
  (USERS_EDIT||[]).forEach(u=>{ if(!isAllUser(u)) (u.states||[]).forEach(st=>s.add(String(st).toUpperCase())); });
  return s;
}
function openUsersEditor(){
  closeProfMenu();
  USERS_EDIT=JSON.parse(JSON.stringify(PROFILES||[]));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  $('#users').classList.add('active');
  const m=$('#usersMsg'); if(m) m.textContent='';
  renderUsersEditor();
}
function renderUsersEditor(){
  const wrap=$('#usersList'); if(!wrap||!USERS_EDIT) return;
  wrap.innerHTML=USERS_EDIT.map((u,i)=>{
    const chips=isAllUser(u)
      ? `<span class="unone">Covers everything — no state filter.</span>`
      : ((u.states&&u.states.length)
          ? u.states.map(st=>`<span class="schip${st==='DC'?' dc':''}">${escHtml(st)}<button title="remove" onclick="removeState(${i},'${esc(st)}')">×</button></span>`).join('')
          : `<span class="unone">No states yet.</span>`);
    const add=isAllUser(u)?'':
      `<input class="uadd" type="text" maxlength="2" placeholder="+ ST" list="usStatesList"
              onkeydown="if(event.key==='Enter'){addState(${i},this.value);this.value='';}">`;
    return `<div class="ucard${isAllUser(u)?' allp':''}">
      <div class="ucard-top">
        <input class="uname" type="text" value="${escAttr(u.name||'')}" placeholder="name"
               oninput="USERS_EDIT[${i}].name=this.value">
        <input class="uphone" type="text" value="${escAttr(u.phone||'')}" placeholder="phone"
               oninput="fmtPhone(this,${i})">
      </div>
      <div class="ulbl">States</div>
      <div class="uchips">${chips}${add}</div>
      <div class="ucard-actions"><button class="btn" onclick="saveUser(${i})">Save</button></div>
    </div>`;
  }).join('');
  renderUnclaimed();
}
function renderUnclaimed(){
  const wrap=$('#unclaimedList'), cnt=$('#unclaimedCount'), dl=$('#usStatesList');
  if(!wrap) return;
  const claimed=claimedSet();
  const free=US_STATES.filter(s=>!claimed.has(s));
  if(cnt) cnt.textContent=free.length?`(${free.length})`:'';
  if(dl) dl.innerHTML=free.map(s=>`<option value="${s}">`).join('');
  wrap.innerHTML=free.length
    ? free.map(s=>`<span class="uc-state${s==='DC'?' dc':''}">${s}</span>`).join('')
    : `<span class="uc-empty">All 50 states + DC are covered.</span>`;
}
function addState(i,val){
  const st=String(val||'').trim().toUpperCase().replace(/[^A-Z]/g,'').slice(0,2);
  if(st.length!==2){ return; }
  // a state belongs to exactly ONE user — pull it off whoever else holds it (reassign)
  let movedFrom=null;
  (USERS_EDIT||[]).forEach((o,j)=>{ if(j!==i && !isAllUser(o) && (o.states||[]).includes(st)){
    o.states=o.states.filter(x=>x!==st); movedFrom=o.name||o.id; } });
  const u=USERS_EDIT[i]; u.states=u.states||[];
  if(!u.states.includes(st)) u.states.push(st);
  renderUsersEditor();
  if(movedFrom) toast(`Moved ${st} from ${movedFrom} → ${u.name||u.id}`);
}
// Auto-format a phone to xxx-xxx-xxxx once exactly 10 digits are present; otherwise keep raw.
function fmtPhone(input,i){
  const d=(input.value||'').replace(/\D/g,'').slice(0,10);
  if(d.length===10){ input.value=`${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6)}`; }
  USERS_EDIT[i].phone=input.value;
}
function removeState(i,st){
  const u=USERS_EDIT[i]; u.states=(u.states||[]).filter(x=>x!==st);
  renderUsersEditor();
}
async function saveUser(i){
  const u=USERS_EDIT[i];
  try{ await api('/api/profile/save',{id:u.id,name:u.name,phone:u.phone,states:(u.states||[]).join(' ')});
    const m=$('#usersMsg'); if(m) m.textContent='Saved '+(u.name||u.id);
    await loadProfiles();
  }catch(e){}
}
async function saveAllUsers(){
  for(const u of (USERS_EDIT||[])){
    try{ await api('/api/profile/save',{id:u.id,name:u.name,phone:u.phone,states:(u.states||[]).join(' ')}); }catch(e){}
  }
  const m=$('#usersMsg'); if(m) m.textContent='All users saved';
  await loadProfiles();
}
async function addUser(){
  const name=(prompt('New user name:')||'').trim();
  if(!name) return;
  try{ const r=await api('/api/profile/add',{name});

// ----- header VIN control: Excel+ button -> live progress -> Post button -----
// One control, four states, driven off /api/tally + /api/run/status (polled so it keeps
// working on a freshly-loaded page mid-run — survives refresh):
//   • no board yet            -> blue "Excel +" button (pick a file and run)
//   • running & VINs landing  -> GREEN fill + blinking dots
//   • stalled / stopped early -> AMBER fill, click to resume (re-read the Excel)
//   • all VINs processed      -> green "Post to SuperDispatch" button
const STALL_MS = 60000;          // no new VINs for this long while "running" => stalled.
                                 // Kept above a single VIN's worst-case retry (search +
                                 // BOL-download timeouts) so a slow tail isn't mistaken
                                 // for a stuck run while the pipeline is still working.
const RUN_DEFAULTS = {create:true, download_bols:false, live:false, workers:4, limit:0, sheet:''};
let _runPoll=null, _runStarted=0, _lastProcessed=-1, _lastChange=0;
let _wasRunning=false;    // tracks run finishing so we reload matches once the scan completes

async function syncRunBar(){
  let s; try{ s=await fetch('/api/run/status').then(r=>r.json()); }catch(e){ syncTally(); return; }
  if(s && s.running){
    if(!_runPoll) _runPoll=setInterval(syncRunBar, 1000);   // keep it live while a run is on
  } else if(_runPoll){
    clearInterval(_runPoll); _runPoll=null;
  }
  syncTally();
}

async function syncTally(){
  const el=$('#tally'), np=$('#navpost'); if(!el) return;
  let t,s;
  try{ t=await fetch('/api/tally').then(r=>r.json()); }catch(e){ return; }
  try{ s=await fetch('/api/run/status').then(r=>r.json()); }catch(e){ s={running:false}; }
  const hasBoard = !!(t && t.total);
  const running = !!(s && s.running);
  // While the run/SD scan is in progress, gray out + lock the board cards (see CSS .scanning)
  // so already-posted units can't be touched before the dedup scan removes them.
  const _bd=$('#board'); if(_bd) _bd.classList.toggle('scanning', running);

  // Excel+ is ALWAYS shown. Once a board is loaded it grays out (but stays clickable) —
  // loading a different Excel clears the current board.
  // One "Excel +" button opens the Add-shipments modal (paste a grid OR pick a file).
  // Blue normally; grays out (still clickable) once a board is loaded.
  const excelBtn = `<button class="btn excelbtn${hasBoard?' loaded':''}" onclick="openPaste()"`
    + ` title="Add shipments — paste cells from Excel/Sheets, or pick an .xlsx file">Excel +</button>`;

  if(!hasBoard){ el.innerHTML=excelBtn; if(np) np.innerHTML='<button class="btn ghostpost" disabled title="Load a board to enable posting">Post to SuperDispatch</button>'; _lastProcessed=-1; return; }

  // No "N / N VINs processed" counter — only the Excel+ button shows here.
  el.innerHTML = excelBtn;

  // Post button: ALWAYS available once a board exists — post whenever (no VIN-count gating).
  // Disabled only for the ALL profile; shows "Scanning…" while a run is still in progress.
  if(np){
    if(ACTIVE_PROFILE==='all'){
      np.innerHTML=`<button class="btn ghostpost" disabled title="ALL is a developer profile for feeding the terminal cache — posting is disabled">Post to SuperDispatch</button>`;
    } else if(running){
      if(!_wasRunning) _wasRunning=true;
      np.innerHTML=`<button class="btn amber" disabled title="Finishing the SuperDispatch loadboard scan — posting unlocks when the scan is in">Scanning loadboard…<span class="dots"><span>.</span><span>.</span><span>.</span></span></button>`;
    } else {
      if(_wasRunning){ _wasRunning=false; load(); }      // scan just finished -> pull in matches
      np.innerHTML=`<button class="btn green" onclick="doPost()">Post to SuperDispatch</button>`;
    }
  }
}

// start a run on the given excel with the standard settings (no console, the tally IS
// the UI). The server owns the subprocess, so we don't need to read the stream.
async function startRun(excelPath){
  if(!excelPath) return;
  _runStarted=Date.now(); _lastProcessed=-1; _lastChange=Date.now();
  try{
    const r=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({excel:excelPath, ...RUN_DEFAULTS})});
    if(!r.ok){ toast((await r.json().catch(()=>({}))).detail || 'Could not start the run'); return; }
  }catch(e){ toast('Could not start the run'); return; }
  syncRunBar();                                          // begin polling -> green animated
}
// blue Excel+ / the small "+" : pick a file ON THE CLIENT and run it FRESH. The file
// picker is the BROWSER's own <input type=file> (so it works over the web — the old
// host-side native dialog only made sense when the browser was on the server machine).
// The chosen file is uploaded to the server, which saves it and returns the path the run
// uses. Loading a new sheet replaces the current board, so we confirm once a file is
// actually chosen.
let _excelInput = null;
function _ensureExcelInput(){
  if(_excelInput) return _excelInput;
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.xlsx,.xlsm';
  inp.style.display = 'none';
  inp.addEventListener('change', onExcelChosen);
  document.body.appendChild(inp);
  _excelInput = inp;
  return inp;
}
async function pickAndRun(){
  if(!ACTIVE_PROFILE){
    toast('Select a dispatcher profile first (top-left).');
    const b=$('#profBtn'); if(b){ b.classList.add('unset'); b.focus(); }
    return;
  }
  const inp = _ensureExcelInput();
  inp.value = '';                                       // allow re-picking the same file
  inp.click();                                          // opens the CLIENT's file dialog
}
async function onExcelChosen(ev){
  const f = ev.target.files && ev.target.files[0];
  if(!f){ return; }
  try{
    let t; try{ t=await fetch('/api/tally').then(r=>r.json()); }catch(e){ t={}; }
    if(t && t.total && !confirm('Load a different Excel? This clears the current board.')) return;
    toast('Uploading '+f.name+'…');
    let saved;
    try{
      const r = await fetch('/api/upload?name='+encodeURIComponent(f.name), {method:'POST', body:f});
      if(!r.ok){ toast((await r.json().catch(()=>({}))).detail || 'Upload failed'); return; }
      saved = await r.json();
    }catch(e){ toast('Upload failed'); return; }
    try{ await fetch('/api/reset',{method:'POST'}); }catch(e){}   // start clean
    _runStarted=0; _lastProcessed=-1;
    toast('Running '+(saved.name||'Excel')+'…');
    await startRun(saved.path);
  } finally {
    ev.target.value = '';                               // reset so the same file re-fires change
  }
}
// "Paste" : drop rows copied from Excel/Sheets (TSV) into a box and run them like an
// upload. Headers are remembered from your last sheet, so you paste DATA only — but a
// pasted header row is detected and used too. Same reset+run pipeline as Excel +.
function openPaste(){
  if(!ACTIVE_PROFILE){
    toast('Select a dispatcher profile first (top-left).');
    const b=$('#profBtn'); if(b){ b.classList.add('unset'); b.focus(); }
    return;
  }
  const m=$('#pasteModal'); if(!m) return;
  m.hidden=false;
  buildPasteGrid();
  const msg=$('#pasteMsg'); if(msg) msg.textContent='';
  const first=cellAt(0,0); if(first) first.focus();   // an immediate Ctrl+V lands top-left
}
function closePaste(){ const m=$('#pasteModal'); if(m) m.hidden=true; }

// ----- blank spreadsheet paste grid (Excel-like; accepts multi-cell paste) -----
const PG_MIN_ROWS=30, PG_MIN_COLS=14;
function colLetter(n){ let s=''; n++; while(n>0){ s=String.fromCharCode(65+(n-1)%26)+s; n=Math.floor((n-1)/26);} return s; }
function buildPasteGrid(rows, cols){
  const t=$('#pasteGrid'); if(!t) return;
  rows=Math.max(rows||0, PG_MIN_ROWS); cols=Math.max(cols||0, PG_MIN_COLS);
  let h='<thead><tr><th class="pg-corner"></th>';
  for(let c=0;c<cols;c++) h+=`<th>${colLetter(c)}</th>`;
  h+='</tr></thead><tbody>';
  for(let r=0;r<rows;r++){
    h+=`<tr><th class="pg-rownum">${r+1}</th>`;
    for(let c=0;c<cols;c++) h+='<td contenteditable="true"></td>';
    h+='</tr>';
  }
  t.innerHTML=h+'</tbody>';
  t.onpaste=onGridPaste; t.onkeydown=onGridKey;
}
function clearPasteGrid(){ buildPasteGrid(); const f=cellAt(0,0); if(f) f.focus();
  const msg=$('#pasteMsg'); if(msg) msg.textContent=''; }
function pgBody(){ return $('#pasteGrid').tBodies[0]; }
function pgRowCount(){ return pgBody().rows.length; }
function pgColCount(){ return $('#pasteGrid').tHead.rows[0].cells.length-1; }
function cellAt(r,c){ const row=pgBody().rows[r]; return row?row.cells[c+1]:null; }   // +1 skips row-number th
function cellPos(td){ return {r:td.parentElement.rowIndex-1, c:td.cellIndex-1}; }      // -1 for header row / row-number col
function addPgCol(){
  const t=$('#pasteGrid'), c=pgColCount();
  const th=document.createElement('th'); th.textContent=colLetter(c); t.tHead.rows[0].appendChild(th);
  for(const row of pgBody().rows){ const td=document.createElement('td'); td.contentEditable='true'; row.appendChild(td); }
}
function addPgRow(){
  const cols=pgColCount(), r=pgRowCount(), tr=pgBody().insertRow();
  const rn=document.createElement('th'); rn.className='pg-rownum'; rn.textContent=r+1; tr.appendChild(rn);
  for(let c=0;c<cols;c++){ const td=document.createElement('td'); td.contentEditable='true'; tr.appendChild(td); }
}
function ensurePgSize(rows, cols){ while(pgColCount()<cols) addPgCol(); while(pgRowCount()<rows) addPgRow(); }
function onGridPaste(e){
  const td=e.target.closest&&e.target.closest('td'); if(!td) return;
  e.preventDefault();
  const text=((e.clipboardData||window.clipboardData).getData('text')||'').replace(/\r/g,'');
  const lines=text.replace(/\n$/,'').split('\n').map(l=>l.split('\t'));
  const {r:sr,c:sc}=cellPos(td);
  const wide=Math.max(...lines.map(l=>l.length));
  ensurePgSize(sr+lines.length, sc+wide);
  lines.forEach((cells,ri)=>cells.forEach((val,ci)=>{ const cell=cellAt(sr+ri, sc+ci); if(cell) cell.textContent=val; }));
  const msg=$('#pasteMsg'); if(msg) msg.textContent=`Pasted ${lines.length} row(s) × ${wide} col(s).`;
}
function onGridKey(e){
  const td=e.target.closest&&e.target.closest('td'); if(!td) return;
  const {r,c}=cellPos(td); let nr=r, nc=c, move=false;
  if(e.key==='Tab'){ move=true; nc=Math.max(0, c+(e.shiftKey?-1:1)); }
  else if(e.key==='Enter'){ move=true; nr=r+1; }
  if(move){ e.preventDefault(); ensurePgSize(nr+1, nc+1); const cell=cellAt(nr,nc);
    if(cell){ cell.focus(); const sel=window.getSelection(); sel.selectAllChildren(cell); sel.collapseToEnd(); } }
}
function gridToTSV(){
  const rows=[...pgBody().rows].map(tr=>[...tr.cells].slice(1).map(td=>(td.textContent||'').replace(/[\t\n]/g,' ')));
  const data=rows.filter(r=>r.some(c=>c.trim()!==''));        // drop blank rows
  if(!data.length) return '';
  let maxC=0; data.forEach(r=>{ for(let i=r.length-1;i>=0;i--){ if(r[i].trim()!==''){ maxC=Math.max(maxC,i+1); break; } } });
  return data.map(r=>r.slice(0,maxC).join('\t')).join('\n');   // trim trailing empty columns
}
async function submitPaste(){
  const msg=$('#pasteMsg');
  const text=gridToTSV();
  if(!text){ if(msg) msg.textContent='Paste some cells first.'; return; }
  let t; try{ t=await fetch('/api/tally').then(r=>r.json()); }catch(e){ t={}; }
  if(t && t.total && !confirm('Load these rows? This clears the current board.')) return;
  if(msg) msg.textContent='Loading…';
  let saved;
  try{
    const r=await fetch('/api/upload-paste',{method:'POST',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify({text})});
    if(!r.ok){ if(msg) msg.textContent=(await r.json().catch(()=>({}))).detail || 'Could not load those rows'; return; }
    saved=await r.json();
  }catch(e){ if(msg) msg.textContent='Could not load those rows'; return; }
  closePaste();
  try{ await fetch('/api/reset',{method:'POST'}); }catch(e){}
  _runStarted=0; _lastProcessed=-1;
  toast('Running '+(saved.rows||'')+' pasted row(s)…');
  await startRun(saved.path);
}
// amber state click : stop any stuck run, then re-read the active Excel from the start
async function resumeRun(){
  let t; try{ t=await fetch('/api/tally').then(r=>r.json()); }catch(e){ return; }
  if(!t || !t.active_excel){ toast('No Excel to resume — use Excel +'); return; }
  try{ await fetch('/api/run/terminate',{method:'POST'}); }catch(e){}   // clear any stuck run
  toast('Resuming '+(t.active_excel_name||'Excel')+'…');
  await startRun(t.active_excel);
}
// Post EVERYTHING live to SuperDispatch, then clear the board (spares are kept). The
// Post button is only enabled once the run (incl. the loadboard scan) has fully finished
// — see syncTally — so by here all posted/accepted matches are already in.
async function doPost(){
  if(ACTIVE_PROFILE==='all'){ toast('Posting is disabled for the ALL profile (terminal-feeding only).'); return; }
  if(!confirm('Post ALL staged shipments LIVE to SuperDispatch (production)?\nThis creates real orders, then clears the board. Spares are kept; anything that fails stays on the board.')) return;
  const el=$('#tally'); if(el) el.innerHTML='<span class="counter green"><span class="lbl">Posting…</span></span>';
  try{
    const r=await api('/api/post-all',{});
    let msg=(r.posted_vins||0)+' VIN(s) successfully posted to SuperDispatch';
    if(r.failed && r.failed.length) msg+=` — ${r.failed.length} failed (kept on the board)`;
    toast(msg);
  }catch(e){ /* api() already toasted */ }
  await load();        // board cleared server-side -> re-render (spares remain)
  syncTally();
}
function _priceVal(value){ const v=value.trim(); return v===''?null:v.replace(/[^0-9.]/g,''); }
async function setOrderPrice(number, value){
  try{ await api('/api/price',{number, total:_priceVal(value)}); await load(); }catch(e){ load(); }
}
async function setConsolPrice(guid, value){
  try{ await api('/api/consolidation/price',{order_guid:guid, total:_priceVal(value)}); await load(); }catch(e){ load(); }
}

// ----------------------- live updates (Server-Sent Events) -----------------------
// The server (/api/events) pings us whenever the board's files change — shipments
// land as BOLs are pulled during a run, SD matches arrive when the scan finishes,
// or an edit comes from another window — and we refresh ourselves instead of you
// pressing Refresh. We never clobber an in-progress drag (we defer until it ends),
// and we preserve which route cards are expanded across the reload. Selections
// already survive a re-render (they re-apply from the SEL set).
let _livePending = false;
function openCardKeys(){
  return [...document.querySelectorAll('.card.open')].map(c =>
    c.dataset.num ? 'num:'+c.dataset.num
    : (c.dataset.guid ? 'guid:'+c.dataset.guid : null)).filter(Boolean);
}
function reopenCards(keys){
  keys.forEach(k => {
    const i=k.indexOf(':'), t=k.slice(0,i), v=k.slice(i+1);
    const sel = t==='num' ? `.card[data-num="${CSS.escape(v)}"]`
                          : `.card[data-guid="${CSS.escape(v)}"]`;
    const el = document.querySelector(sel);
    if(el) el.classList.add('open');
  });
}
async function liveReload(){
  if(DRAG){ _livePending = true; return; }      // don't interrupt a drag — do it on drop
  const open = openCardKeys();
  await load();
  reopenCards(open);
}
// The live stream is pinned to the current dispatcher via ?profile= (EventSource can't
// send headers), so each window watches ITS OWN board. Switching dispatcher tears the
// old stream down and opens a new one for the new board.
let _es=null;
function startLive(){
  if(!('EventSource' in window)) return;         // very old browsers: stay on manual Refresh
  try{ if(_es){ _es.close(); _es=null; } }catch(e){}
  try{
    const q = ACTIVE_PROFILE ? ('?profile='+encodeURIComponent(ACTIVE_PROFILE)) : '';
    _es = new EventSource('/api/events'+q);
    _es.addEventListener('changed', () => liveReload());
    // the browser auto-reconnects on a dropped connection; nothing to handle here
  }catch(e){}
}

fetch('/api/env').then(r=>r.json()).then(d=>{
  if(d.test_mode){
    document.body.classList.add('testmode');
    const e=$('#env'); if(e){ e.textContent='TEST SITE — SD disabled'; e.classList.add('testpill'); }
  } else {
    $('#env').textContent='SD_ENV: prod v2.3';
  }
}).catch(()=>{});
// restore the active dispatcher FIRST, then open the live stream for its board (so the
// SSE carries ?profile= from the start), load that board, and pick up any run already
// in progress for it.
loadProfiles()
  .then(()=>{ startLive(); load(); syncRunBar(); })
  .catch(()=>{ startLive(); load(); });
</script>
